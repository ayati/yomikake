<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ePub viewer yomikake</title>
<style>
  :root {
    --bg:#f8f6f2; --paper:#ffffff; --text:#201a15;
    --accent:#b55632; --ui-bg:#ffffff; --ui-text:#332922;
    --ui-border:#e5dfd5; --shadow:rgba(0,0,0,0.08); --page-shadow:rgba(0,0,0,0.05);
    --hover-bg:rgba(0,0,0,0.04); --backdrop:rgba(255,255,255,0.85); --glass-border:rgba(255,255,255,0.4);
  }
  .theme-dark   { --bg:#141417; --paper:#1c1c20; --text:#e0dcd5; --accent:#dc6e4c; --ui-bg:#1c1c20; --ui-text:#e0dcd5; --ui-border:#33333b; --shadow:rgba(0,0,0,0.7); --page-shadow:rgba(0,0,0,0.5); --hover-bg:rgba(255,255,255,0.08); --backdrop:rgba(28,28,32,0.85); --glass-border:rgba(255,255,255,0.08); }
  .theme-sepia  { --bg:#f4ecd8; --paper:#fbf6eb; --text:#4a3825; --accent:#9c6142; --ui-bg:#fbf6eb; --ui-text:#4a3825; --ui-border:#d9cbb0; --shadow:rgba(74,56,37,0.1); --page-shadow:rgba(74,56,37,0.06); --hover-bg:rgba(74,56,37,0.06); --backdrop:rgba(251,246,235,0.85); --glass-border:rgba(255,255,255,0.3); }
  .theme-white  { --bg:#ececec; --paper:#ffffff; --text:#181818; --accent:#1e78a0; --ui-bg:#ffffff; --ui-text:#222; --ui-border:#d4d4d4; --shadow:rgba(0,0,0,0.15); --page-shadow:rgba(0,0,0,0.08); --hover-bg:rgba(0,0,0,0.05); --backdrop:rgba(255,255,255,0.9); --glass-border:rgba(255,255,255,0.5); }
  .theme-sakura { --bg:#f5e0e5; --paper:#fff5f7; --text:#3d1020; --accent:#c06070; --ui-bg:#fff5f7; --ui-text:#3d1020; --ui-border:#f0cdd5; --shadow:rgba(180,90,100,0.08); --page-shadow:rgba(180,90,100,0.05); --hover-bg:rgba(180,90,100,0.06); --backdrop:rgba(255,245,247,0.88); --glass-border:rgba(240,180,190,0.35); }
  .theme-hoshi  { --bg:#080e18; --paper:#0e1a2e; --text:#c8daf0; --accent:#5588cc; --ui-bg:#0e1a2e; --ui-text:#c8daf0; --ui-border:#1e3050; --shadow:rgba(0,0,0,0.6); --page-shadow:rgba(0,0,0,0.4); --hover-bg:rgba(255,255,255,0.07); --backdrop:rgba(14,26,46,0.88); --glass-border:rgba(255,255,255,0.07); }
  .theme-matcha { --bg:#d8e8c8; --paper:#f0f5e8; --text:#1e301a; --accent:#507840; --ui-bg:#f0f5e8; --ui-text:#1e301a; --ui-border:#c0d8a8; --shadow:rgba(30,48,26,0.08); --page-shadow:rgba(30,48,26,0.05); --hover-bg:rgba(30,48,26,0.06); --backdrop:rgba(240,245,232,0.88); --glass-border:rgba(160,200,140,0.3); }
  .theme-tsuki  { --bg:#d8d8f0; --paper:#f0f0fa; --text:#1a1840; --accent:#5858a0; --ui-bg:#f0f0fa; --ui-text:#1a1840; --ui-border:#c8c8e8; --shadow:rgba(26,24,64,0.08); --page-shadow:rgba(26,24,64,0.05); --hover-bg:rgba(26,24,64,0.05); --backdrop:rgba(240,240,250,0.88); --glass-border:rgba(180,180,220,0.35); }

  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background:var(--bg); color:var(--text); height:100vh; height:100dvh; overflow:hidden; display:flex; flex-direction:column; user-select:none; padding-bottom:env(safe-area-inset-bottom,0); }

  #toolbar { min-height:40px; background:var(--ui-bg); border-bottom:1px solid var(--ui-border); display:flex; align-items:center; padding:0 8px; gap:4px; flex-shrink:0; box-shadow:0 1px 4px var(--shadow); z-index:100; position:relative; }
  
  #toolbar button, .icon-btn { background:transparent; border:none; color:var(--ui-text); padding:4px 8px; border-radius:6px; cursor:pointer; font-size:13px; display:flex; align-items:center; gap:4px; transition:all .15s ease; font-weight:500; }
  #toolbar button:hover, .icon-btn:hover { background:var(--hover-bg); }
  #toolbar button svg, .icon-btn svg { width:16px; height:16px; opacity:0.8; }
  #toolbar button.active { background:var(--hover-bg); color:var(--accent); }
  #toolbar button.active svg { opacity:1; stroke:var(--accent); }
  #drive-upload-btn.auto-save-on { box-shadow:0 0 0 1.5px var(--ui-text); }
  #toolbar .tb-sep { width:1px; height:20px; background:var(--ui-border); margin:0 4px; flex-shrink:0; }

  #book-title { font-size:13px; font-weight:600; opacity:.9; flex:1; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 12px; }
  #open-btn { background:var(--accent)!important; color:#fff!important; padding:4px 12px!important; box-shadow:0 2px 6px rgba(181,86,50,0.3); }
  #open-btn:hover { filter:brightness(1.1); }
  #open-btn svg { stroke:#fff; }

  /* Settings Popover */
  .popover-overlay { position:fixed; inset:0; z-index:400; display:none; }
  .popover-overlay.show { display:block; }
  #settings-popover { position:absolute; top:64px; right:16px; width:340px; background:var(--backdrop); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid var(--glass-border); border-radius:16px; box-shadow:0 12px 32px var(--shadow), 0 2px 8px var(--shadow); z-index:500; opacity:0; visibility:hidden; transform:translateY(-8px); transition:all .2s cubic-bezier(0.16,1,0.3,1); display:flex; flex-direction:column; overflow:hidden; max-height:calc(100dvh - 72px - env(safe-area-inset-bottom, 0px)); }
  #settings-popover.show { opacity:1; visibility:visible; transform:translateY(0); }
  .pop-header { padding:16px 20px; font-weight:600; font-size:15px; border-bottom:1px solid var(--ui-border); color:var(--ui-text); display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.02); flex-shrink:0; }
  .pop-body { padding:0 12px 12px; flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  
  .set-group { margin-top:20px; padding-bottom:4px; }
  .set-group h4 { font-size:12px; font-weight:600; color:var(--ui-text); opacity:0.6; text-transform:uppercase; margin:0 8px 12px; letter-spacing:0.5px; }
  .set-row { display:flex; align-items:center; justify-content:space-between; padding:8px; border-radius:8px; }
  .set-row:hover { background:var(--hover-bg); }
  .set-label { font-size:14px; color:var(--ui-text); }
  
  select.modern-select { appearance:none; background:var(--ui-bg); border:1px solid var(--ui-border); color:var(--ui-text); padding:8px 32px 8px 12px; border-radius:8px; font-size:13px; cursor:pointer; outline:none; font-family:inherit; background-image:url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" fill="none" stroke="%23888" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'); background-repeat:no-repeat; background-position:right 8px center; background-size:14px; min-width:140px; box-shadow:inset 0 1px 2px rgba(0,0,0,0.02); }
  
  .btn-group { display:flex; background:var(--ui-bg); border:1px solid var(--ui-border); border-radius:8px; overflow:hidden; }
  .btn-group button { background:transparent; border:none; padding:8px 16px; color:var(--ui-text); cursor:pointer; font-size:14px; transition:background .15s; }
  .btn-group button:hover { background:var(--hover-bg); }
  .btn-group span { display:flex; align-items:center; justify-content:center; padding:0 8px; font-size:13px; font-weight:500; border-left:1px solid var(--ui-border); border-right:1px solid var(--ui-border); min-width:54px; color:var(--ui-text); }
  
  .theme-options { display:grid; grid-template-columns:repeat(4,32px); gap:6px; }
  .theme-btn { width:32px; height:32px; border-radius:50%; border:2px solid var(--ui-border); cursor:pointer; transition:transform .15s; display:flex; align-items:center; justify-content:center; }
  .theme-btn:hover { transform:scale(1.1); }
  .theme-btn.active { border-color:var(--accent); }
  .theme-btn svg { width:14px; height:14px; stroke:var(--accent); stroke-width:3; opacity:0; }
  .theme-btn.active svg { opacity:1; }

  .tb-std    { background:#fdf8f0; border-color:#e5dfd5; }
  .tb-sepia  { background:#fbf6eb; border-color:#d9cbb0; }
  .tb-dark   { background:#1c1c20; border-color:#33333b; }
  .tb-white  { background:#ffffff; border-color:#d4d4d4; }
  .tb-sakura { background:#fff5f7; border-color:#f0cdd5; }
  .tb-hoshi  { background:#0e1a2e; border-color:#1e3050; }
  .tb-matcha { background:#f0f5e8; border-color:#c0d8a8; }
  .tb-tsuki  { background:#f0f0fa; border-color:#c8c8e8; }

  /* Font Picker */
  #font-picker { width:100%; }
  #font-picker-btn { width:100%; display:flex; justify-content:space-between; align-items:center; gap:6px; padding:7px 10px; border-radius:8px; border:1px solid var(--ui-border); background:var(--ui-bg); color:var(--ui-text); cursor:pointer; font-size:13px; font-family:inherit; box-shadow:inset 0 1px 2px rgba(0,0,0,0.02); }
  #font-picker-btn:hover { background:var(--hover-bg); }
  #font-picker-label { flex:1; text-align:left; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #font-picker-arrow { flex-shrink:0; font-size:10px; opacity:.6; transition:transform .2s; }
  #font-picker-btn[aria-expanded="true"] #font-picker-arrow { transform:rotate(180deg); }
  #font-picker-list { margin-top:4px; border:1px solid var(--ui-border); border-radius:8px; background:var(--ui-bg); max-height:220px; overflow-y:auto; -webkit-overflow-scrolling:touch; display:none; }
  #font-picker-list.open { display:block; }
  .fp-group-header { padding:5px 10px 3px; font-size:11px; font-weight:600; color:var(--ui-text); opacity:.5; letter-spacing:.3px; }
  .fp-group-header:not(:first-child) { border-top:1px solid var(--ui-border); margin-top:2px; padding-top:7px; }
  .fp-item { display:flex; justify-content:space-between; align-items:center; padding:6px 10px; cursor:pointer; gap:8px; }
  .fp-item:hover { background:var(--accent); color:#fff; }
  .fp-item:hover .fp-sample { color:#fff; opacity:.8; }
  .fp-item.fp-selected { background:var(--hover-bg); }
  .fp-item.fp-selected .fp-name::before { content:'✓ '; }
  .fp-name { font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fp-sample { font-size:13px; white-space:nowrap; color:var(--ui-text); opacity:.55; flex-shrink:0; }

  .lang-select { appearance:none; background:var(--ui-bg); border:1px solid var(--ui-border); color:var(--ui-text); padding:4px 20px 4px 8px; border-radius:6px; font-size:12px; cursor:pointer; font-family:inherit; font-weight:500; background-image:url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" fill="none" stroke="%23888" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'); background-repeat:no-repeat; background-position:right 4px center; background-size:12px; outline:none; }
  .lang-select:hover { background-color:var(--hover-bg); }

  #main { flex:1; display:flex; overflow:hidden; }

  #sidebar { width:280px; background:var(--ui-bg); border-right:1px solid var(--ui-border); display:flex; flex-direction:column; transition:transform .3s cubic-bezier(0.16,1,0.3,1); overflow:hidden; flex-shrink:0; position:relative; z-index:90; }
  #sidebar.hidden { transform:translateX(-100%); margin-right:-280px; }
  #sidebar-tabs { display:flex; border-bottom:1px solid var(--ui-border); flex-shrink:0; }
  .sidebar-tab { flex:1; display:flex; align-items:center; justify-content:center; gap:5px; padding:10px 8px; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--ui-text); cursor:pointer; font-size:13px; font-family:inherit; font-weight:500; opacity:.6; transition:all .15s; }
  .sidebar-tab:hover { opacity:.9; background:var(--hover-bg); }
  .sidebar-tab.active { opacity:1; color:var(--accent); border-bottom-color:var(--accent); }
  .sidebar-tab svg { width:14px; height:14px; stroke:currentColor; stroke-width:2; fill:none; }
  #toc-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #toc-list { flex:1; overflow-y:auto; padding:8px 0; }
  #search-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #search-input-area { padding:10px 12px; display:flex; gap:6px; border-bottom:1px solid var(--ui-border); flex-shrink:0; }
  #search-input { flex:1; padding:7px 10px; border:1px solid var(--ui-border); border-radius:8px; background:var(--ui-bg); color:var(--ui-text); font-size:13px; font-family:inherit; outline:none; }
  #search-input:focus { border-color:var(--accent); }
  #search-input::placeholder { color:var(--ui-text); opacity:.4; }
  #search-btn { padding:7px 12px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:13px; cursor:pointer; font-family:inherit; white-space:nowrap; }
  #search-btn:disabled { opacity:.45; cursor:default; }
  #search-progress-bar { height:2px; background:var(--ui-border); flex-shrink:0; }
  #search-progress-fill { height:100%; background:var(--accent); transition:width .15s; width:0%; }
  #search-status { padding:5px 12px; font-size:12px; color:var(--ui-text); opacity:.65; flex-shrink:0; display:flex; align-items:center; justify-content:space-between; min-height:26px; }
  #search-cancel-btn { font-size:12px; color:var(--accent); background:transparent; border:none; cursor:pointer; padding:2px 6px; font-family:inherit; }
  #search-results { flex:1; overflow-y:auto; padding:4px 0; }
  .sr-item { padding:9px 14px; cursor:pointer; border-bottom:1px solid var(--ui-border); transition:background .15s; }
  .sr-item:last-child { border-bottom:none; }
  .sr-item:hover { background:var(--hover-bg); }
  .sr-chapter { font-size:13px; font-weight:600; color:var(--ui-text); margin-bottom:4px; display:flex; align-items:center; justify-content:space-between; gap:6px; }
  .sr-chapter-title { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sr-badge { font-size:11px; background:var(--accent); color:#fff; border-radius:10px; padding:1px 7px; font-weight:500; flex-shrink:0; }
  .sr-snippet { font-size:12px; color:var(--ui-text); opacity:.75; line-height:1.65; margin-top:2px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; }
  .sr-snippet mark { background:transparent; color:var(--accent); font-weight:600; }
  .sr-more { font-size:11px; color:var(--accent); opacity:.85; margin-top:3px; }
  #toc-list::-webkit-scrollbar { width:6px; }
  #toc-list::-webkit-scrollbar-thumb { background:var(--ui-border); border-radius:3px; }
  .toc-item { padding:12px 20px; color:var(--ui-text); cursor:pointer; font-size:14px; transition:all .15s; border-left:3px solid transparent; line-height:1.5; opacity:.85; }
  .toc-item:hover { background:var(--hover-bg); opacity:1; }
  .toc-item.current { border-left-color:var(--accent); background:var(--hover-bg); opacity:1; color:var(--accent); font-weight:500; }
  #jump-history-section { flex-shrink:0; }
  .history-item { padding:8px 20px 8px 16px; color:var(--ui-text); cursor:pointer; font-size:13px; transition:all .15s; border-left:3px solid transparent; display:flex; align-items:baseline; gap:5px; opacity:.8; }
  .history-item:hover { background:var(--hover-bg); opacity:1; }
  .history-icon { flex-shrink:0; }
  .history-label { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .history-pct { opacity:.55; font-size:11px; flex-shrink:0; }
  hr.history-divider { border:none; border-top:1px solid var(--ui-border); margin:4px 0 0; }

  #reading-area { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; padding:var(--page-padding,16px); background:var(--bg); transition:padding .3s; }

  #welcome { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:32px; color:var(--text); opacity:.8; animation:fadeIn .5s ease; overflow-y:auto; }
  #welcome.has-list { justify-content:flex-start; padding:28px 16px 32px; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  
  #drop-zone { border:2px dashed var(--ui-border); border-radius:24px; padding:48px 64px; text-align:center; cursor:pointer; transition:all .2s; max-width:480px; background:var(--paper); box-shadow:0 4px 16px var(--page-shadow); }
  #drop-zone:hover, #drop-zone.dragover { border-color:var(--accent); background:rgba(181,86,50,.03); transform:scale(1.02); }
  #drop-zone svg { width:64px; height:64px; stroke:var(--accent); opacity:.8; margin-bottom:24px; stroke-width:1.5; }
  #drop-zone h2 { font-size:24px; font-weight:600; margin-bottom:12px; }
  #drop-zone p { font-size:14px; opacity:.7; line-height:1.6; }

  #resume-banner { display:none; }

  /* ── 読みかけリスト ── */
  #reading-list { display:none; width:100%; max-width:580px; flex-direction:column; gap:0; }
  #reading-list-header { display:flex; align-items:baseline; gap:8px; margin-bottom:16px; }
  #reading-list-header h2 { font-size:17px; font-weight:700; margin:0; }
  #reading-list-count { font-size:12px; opacity:.55; }
  #reading-list-items { display:flex; flex-direction:column; gap:12px; }
  .rl-card { display:flex; gap:16px; align-items:stretch; background:var(--ui-bg); border:1px solid var(--ui-border); border-radius:14px; padding:18px 18px; transition:transform .15s, box-shadow .15s; position:relative; overflow:hidden; min-height:96px; }
  .rl-card:hover { transform:translateY(-1px); box-shadow:0 6px 20px var(--shadow); }
  .rl-card.rl-last::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent); border-radius:14px 0 0 14px; }
  .rl-thumb { flex-shrink:0; width:54px; height:76px; border-radius:5px; overflow:hidden; background:var(--hover-bg); display:flex; align-items:center; justify-content:center; align-self:flex-start; }
  .rl-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .rl-thumb svg { width:28px; height:28px; opacity:.35; stroke:var(--ui-text); }
  .rl-info { flex:1; min-width:0; display:flex; flex-direction:column; gap:7px; }
  .rl-title { font-size:14px; font-weight:600; line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .rl-creator { font-size:12px; opacity:.65; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rl-progress-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .rl-bar { flex:1; min-width:60px; height:6px; background:var(--ui-border); border-radius:3px; overflow:hidden; }
  .rl-fill { height:100%; background:var(--accent); border-radius:3px; transition:width .3s; }
  .rl-chapter { font-size:12px; opacity:.65; white-space:nowrap; flex-shrink:0; }
  .rl-pct { font-size:12px; font-weight:600; opacity:.8; flex-shrink:0; min-width:2.8em; text-align:right; }
  .rl-meta { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:2px; }
  .rl-date { font-size:12px; opacity:.5; white-space:nowrap; }
  .rl-open-btn { font-size:13px; font-weight:600; color:var(--accent); background:transparent; border:1.5px solid var(--accent); border-radius:9px; padding:6px 14px; cursor:pointer; white-space:nowrap; transition:all .15s; flex-shrink:0; }
  .rl-open-btn:hover { background:var(--accent); color:#fff; }
  .rl-open-direct { background:var(--accent); color:#fff; }
  .rl-open-direct:hover { filter:brightness(1.1); }
  #reading-list-edit-btn { margin-left:auto; font-size:12px; font-weight:600; color:var(--accent); background:transparent; border:1.5px solid var(--accent); border-radius:8px; padding:4px 12px; cursor:pointer; flex-shrink:0; transition:all .15s; }
  .rl-delete-btn { display:none; position:absolute; top:10px; right:10px; width:28px; height:28px; border-radius:50%; background:#e53e3e; border:none; color:#fff; font-size:18px; line-height:1; cursor:pointer; align-items:center; justify-content:center; z-index:2; }
  #reading-list.edit-mode .rl-delete-btn { display:flex; }
  #reading-list.edit-mode .rl-open-btn { pointer-events:none; opacity:0.35; }
  #reading-list-footer { margin-top:18px; display:flex; justify-content:center; align-items:center; gap:12px; padding-bottom:8px; }
  #reading-list-new-btn { font-size:13px; font-weight:600; color:var(--ui-text); background:var(--ui-bg); border:1px solid var(--ui-border); border-radius:10px; padding:10px 24px; cursor:pointer; transition:all .15s; }
  #reading-list-new-btn:hover { border-color:var(--accent); color:var(--accent); }
  #reading-list-done-btn { display:none; font-size:13px; font-weight:600; color:var(--accent); background:transparent; border:1.5px solid var(--accent); border-radius:10px; padding:10px 24px; cursor:pointer; transition:all .15s; }
  #reading-list-done-btn:hover { background:var(--accent); color:#fff; }
  #reading-list.edit-mode #reading-list-done-btn { display:inline-block; }

  /* ── 読了バナー ── */
  #finished-banner { display:none; position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:50; background:var(--backdrop); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid var(--glass-border); border-radius:16px; padding:14px 20px; box-shadow:0 8px 32px var(--shadow); white-space:nowrap; align-items:center; gap:12px; animation:fadeIn .3s ease; }
  #finished-banner.show { display:flex; }
  #finished-banner-msg { font-size:14px; font-weight:600; }
  #finished-banner-close-btn { font-size:13px; font-weight:700; color:var(--accent); background:transparent; border:1.5px solid var(--accent); border-radius:10px; padding:5px 14px; cursor:pointer; transition:all .15s; }
  #finished-banner-close-btn:hover { background:var(--accent); color:#fff; }
  #finished-banner-dismiss-btn { font-size:12px; opacity:.55; background:transparent; border:none; cursor:pointer; color:var(--ui-text); padding:4px 6px; }
  #finished-banner-dismiss-btn:hover { opacity:1; }

  /* ── 設定ポップオーバー内「閉じる」ボタン ── */
  .set-close-group { border-top:1px solid var(--ui-border) !important; padding-top:12px !important; }
  #close-book-btn { width:100%; font-size:13px; font-weight:600; color:var(--ui-text); opacity:.65; background:transparent; border:1px solid var(--ui-border); border-radius:10px; padding:9px 16px; cursor:pointer; transition:all .15s; text-align:left; }
  #close-book-btn:hover { opacity:1; border-color:var(--accent); color:var(--accent); }

  #page-container { width:100%; height:100%; display:none; align-items:stretch; justify-content:center; position:relative; }
  #page-container.visible { display:flex; }

  #epub-frame { background:var(--paper); box-shadow:0 12px 48px var(--page-shadow),0 2px 12px var(--shadow); border-radius:4px; overflow:hidden; position:relative; display:flex; flex-direction:column; width:100%; max-width:var(--frame-max-width,900px); transition:max-width .3s cubic-bezier(0.16,1,0.3,1); }
  #page-overlay { position:absolute; inset:0; background:var(--paper); opacity:0; pointer-events:none; z-index:10; transition:opacity .2s cubic-bezier(0.2,0,0,1); }
  #page-overlay.flash { opacity:.8; }

  #content-iframe { width:100%; flex:1; border:none; background:transparent; display:block; }

  .chapter-btn { position:absolute; top:50%; transform:translateY(-50%); width:64px; height:140px; background:transparent; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:32px; transition:all .3s ease; opacity:0; z-index:20; -webkit-tap-highlight-color:transparent; outline:none !important; color:transparent; }
  .chapter-btn:focus, .chapter-btn:active { outline:none !important; background:transparent !important; color:transparent; }
  .chapter-btn svg { width:28px; height:28px; stroke:transparent; stroke-width:1.5; transition:stroke .3s; }
  #btn-prev { right:16px; }
  #btn-next { left:16px; }

  .scroll-btn { position:absolute; left:50%; transform:translateX(-50%); width:180px; height:56px; background:transparent; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:28px; transition:all .3s ease; opacity:0; z-index:20; -webkit-tap-highlight-color:transparent; outline:none !important; color:transparent; font-family:inherit; font-weight:500; font-size:14px; }
  .scroll-btn:focus, .scroll-btn:active { outline:none !important; background:transparent !important; color:transparent; }
  .scroll-btn svg { width:20px; height:20px; stroke:transparent; stroke-width:2; transition:stroke .3s; }
  
  #btn-scroll-fwd { bottom:max(24px, env(safe-area-inset-bottom, 24px)); width:360px; height:120px; border-radius:60px; font-size:18px; }
  #btn-scroll-fwd svg { width:28px; height:28px; }
  #btn-scroll-back { top:16px; }
  
  .nav-hint { opacity:0.8 !important; background:var(--accent) !important; color:#fff !important; box-shadow:0 8px 32px var(--shadow); }
  .nav-hint svg { stroke:#fff !important; }

  #statusbar { height:36px; background:var(--ui-bg); border-top:1px solid var(--ui-border); display:flex; align-items:center; padding:0 16px; gap:16px; font-size:13px; color:var(--ui-text); flex-shrink:0; position:relative; z-index:30; }
  #page-info { flex:1; text-align:center; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-variant-numeric: tabular-nums; letter-spacing: 0.5px; opacity: 0.8; }
  #progress-bar { width:160px; height:6px; background:var(--ui-border); border-radius:3px; overflow:hidden; cursor:pointer; position:relative; }
  #progress-bar::before { content:''; position:absolute; inset:-8px 0; } /* クリック領域を上下に拡張 */
  #progress-bar:hover #progress-fill { filter:brightness(1.2); }
  #progress-fill { height:100%; background:var(--accent); border-radius:3px; transition:width .3s ease-out; width:0%; }
  #progress-tooltip { position:fixed; background:var(--ui-bg); border:1px solid var(--ui-border); border-radius:6px; padding:3px 9px; font-size:11px; color:var(--ui-text); white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .12s; transform:translate(-50%,-100%); z-index:50; box-shadow:0 2px 8px rgba(0,0,0,.15); margin-top:-8px; }
  #progress-tooltip.show { opacity:1; }
  #key-hint { opacity:.5; font-size:12px; }

  #modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); z-index:200; display:none; align-items:center; justify-content:center; opacity:0; transition:opacity .2s; }
  #modal-overlay.show { display:flex; opacity:1; }
  #modal-box { background:var(--ui-bg); border:1px solid var(--ui-border); border-radius:16px; padding:32px; min-width:380px; max-width:480px; color:var(--ui-text); box-shadow:0 16px 48px rgba(0,0,0,.3); transform:translateY(20px) scale(0.95); transition:all .3s cubic-bezier(0.16,1,0.3,1); }
  #modal-overlay.show #modal-box { transform:translateY(0) scale(1); }
  #modal-box h3 { font-size:20px; margin-bottom:20px; color:var(--text); font-weight:600; display:flex; align-items:center; gap:8px; }
  #modal-box p { font-size:14px; line-height:1.8; opacity:.85; }
  #modal-body { max-height:calc(80vh - 120px); overflow-y:auto; }
  #modal-close { margin-top:24px; background:var(--accent); border:none; color:#fff; padding:10px 24px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; float:right; transition:filter .15s; }
  #modal-close:hover { filter:brightness(1.1); }
  #file-input { display:none; }
  #toast { position:fixed; top:72px; left:50%; transform:translateX(-50%) translateY(-10px); background:var(--text); color:var(--bg); padding:10px 24px; border-radius:24px; font-size:13px; font-weight:500; z-index:300; opacity:0; visibility:hidden; transition:all .3s cubic-bezier(0.16,1,0.3,1); pointer-events:none; white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,0.15); }
  #toast.show { opacity:1; visibility:visible; transform:translateX(-50%) translateY(0); }
  
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--ui-border); border-radius:4px; border:2px solid var(--ui-bg); }
  ::-webkit-scrollbar-thumb:hover { background:var(--text); opacity:0.3; }

  /* ── フルスクリーン ── */
  #toolbar, #statusbar { transition: opacity .2s ease; }
  body.fullscreen #toolbar {
    position:fixed; top:-200px; left:0; right:0; opacity:0; pointer-events:none;
  }
  body.fullscreen #statusbar {
    position:fixed; bottom:-200px; left:0; right:0; opacity:0; pointer-events:none;
  }
  #fs-exit-zone {
    position:fixed; top:0; left:0; right:0; height:16px; z-index:50;
    background:var(--accent); opacity:.15; cursor:pointer;
    display:none; transition:opacity .2s;
  }
  body.fullscreen #fs-exit-zone { display:block; }
  #fs-exit-zone:hover { opacity:.35; }
  #fs-exit-btn {
    position:fixed; top:0; left:50%; transform:translateX(-50%) translateY(-100%);
    padding:10px 28px; background:var(--accent); color:#fff; border:none;
    border-radius:0 0 14px 14px; z-index:51; font-size:14px; font-weight:600;
    font-family:inherit; cursor:pointer; opacity:0; pointer-events:none;
    transition:transform .25s ease, opacity .2s;
  }
  #fs-exit-btn.show { transform:translateX(-50%) translateY(0); opacity:.95; pointer-events:auto; }

  /* ── タッチデバイス：前進ボタンのみわずかに表示 ── */
  /* chapter-btn は opacity:0 / stroke:transparent のまま（基本値）とする。
     scroll-fwd と同様に stroke を設定しないことで形が見えなくなり、
     上下ボタンと見た目の一貫性を保つ。 */
  @media (hover: none) and (pointer: coarse) {
    #btn-scroll-fwd { opacity:.22; }
  }

  /* ── スマホ向け ── */
  @media (max-width: 640px) {
    #statusbar { display:none; }
    #reading-area { padding:var(--page-padding,8px); }
    /* opacity はここで設定しない：タッチデバイスでは sticky hover により
       #page-container:hover が粘着し、nav-hint 解除後も ＜＞ が残り続ける
       Android Chrome バグを防ぐため。opacity は hover:hover 条件下でのみ指定する。 */
    .chapter-btn { width:36px; height:60px; border-radius:12px; }
    .scroll-btn { width:120px; height:40px; }
    #btn-scroll-fwd { bottom:max(16px, env(safe-area-inset-bottom, 16px)); }
    #btn-scroll-back { top:16px; }
    #sidebar { width:240px; position:absolute; left:0; top:56px; bottom:0; z-index:95; border-right:1px solid var(--glass-border); background:var(--backdrop); backdrop-filter:blur(16px); }
    #sidebar.hidden { transform:translateX(-100%); margin-right:0; }
    #toolbar { padding:0 8px; overflow-x:auto; overflow-y:hidden; touch-action:pan-x; scrollbar-width:none; }
    #toolbar::-webkit-scrollbar { display:none; }
    #toolbar > * { flex-shrink:0; }
    #book-title { display:none; }
    #settings-popover { right:8px; width:calc(100vw - 16px); }
  }
  /* ── スマホ向け（ホバー可能デバイスのみ：PC幅縮小時など）── */
  /* タッチデバイスは sticky hover で永続発動するためここには含めない */
  @media (max-width: 640px) and (hover: hover) {
    .chapter-btn { opacity:.8; }
    #page-container:hover .chapter-btn { opacity:.8; }
    .scroll-btn { opacity:.9; }
    #page-container:hover .scroll-btn { opacity:.9; }
  }
</style>
</head>
<body>

<div id="toolbar">
  <button id="open-btn" onclick="openFilePicker()" data-i18n-title="btn.open.title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"/><polyline points="14 2 14 8 20 8"/><path d="M4 15h12"/><path d="M4 19h12"/></svg>
    <span data-i18n="btn.open">開く</span>
  </button>
  <input type="file" id="file-input" accept=".epub,.kepub">

  <div class="tb-sep"></div>

  <button id="toc-btn" onclick="toggleSidebar()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span data-i18n="btn.toc">目次</span>
  </button>

  <div id="book-title">ePub viewer yomikake</div>

  <button class="icon-btn" onclick="document.getElementById('bookmark-input').click()" data-i18n-title="btn.bookmark.import">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  </button>
  <button class="icon-btn" onclick="exportBookmarks()" data-i18n-title="btn.bookmark.export">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  </button>
  <button class="icon-btn" id="drive-download-btn" onclick="driveDownload()" data-i18n-title="btn.drive.download">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke-dasharray="3 2"/><polyline points="8 12 12 16 16 12"/><line x1="12" y1="8" x2="12" y2="16"/></svg>
  </button>
  <button class="icon-btn" id="drive-upload-btn" onclick="driveUpload()" data-i18n-title="btn.drive.upload">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke-dasharray="3 2"/><polyline points="16 12 12 8 8 12"/><line x1="12" y1="16" x2="12" y2="8"/></svg>
  </button>
  <input type="file" id="bookmark-input" accept=".json" style="display:none">

  <div class="tb-sep"></div>

  <button class="icon-btn" id="settings-btn" onclick="toggleSettings()" data-i18n-title="btn.settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>

  <button class="icon-btn" onclick="flashNavButtons()" data-i18n-title="btn.flash">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>

  <button class="icon-btn" onclick="showHelp()" data-i18n-title="btn.help">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  </button>

  <button class="icon-btn" id="fs-btn" onclick="toggleFullscreen()" data-i18n-title="btn.fullscreen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
  </button>

</div>

<div class="popover-overlay" id="settings-overlay" onclick="toggleSettings()"></div>
<div id="settings-popover">
  <div class="pop-header">
    <span data-i18n="settings.title">表示設定</span>
    <button class="icon-btn" onclick="toggleSettings()" style="padding:4px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="pop-body">
    <div class="set-group">
      <h4 data-i18n="settings.language">言語</h4>
      <div class="set-row">
        <select class="modern-select lang-select" onchange="setLang(this.value)" title="Language / 言語">
          <option value="ja">日本語</option>
          <option value="en">English</option>
          <option value="zh-TW">繁體中文</option>
          <option value="zh-CN">简体中文</option>
        </select>
      </div>
    </div>

    <div class="set-group">
      <h4 data-i18n="settings.color">カラー</h4>
      <div class="set-row">
        <span class="set-label" data-i18n="settings.theme">テーマ</span>
        <div class="theme-options">
          <div class="theme-btn tb-std"    onclick="changeTheme('')"       data-i18n-title="theme.std"   ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="theme-btn tb-sepia"  onclick="changeTheme('sepia')"  data-i18n-title="theme.sepia" ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="theme-btn tb-white"  onclick="changeTheme('white')"  data-i18n-title="theme.white" ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="theme-btn tb-dark"   onclick="changeTheme('dark')"   data-i18n-title="theme.dark"  ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="theme-btn tb-sakura" onclick="changeTheme('sakura')" data-i18n-title="theme.sakura"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="theme-btn tb-hoshi"  onclick="changeTheme('hoshi')"  data-i18n-title="theme.hoshi" ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="theme-btn tb-matcha" onclick="changeTheme('matcha')" data-i18n-title="theme.matcha"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="theme-btn tb-tsuki"  onclick="changeTheme('tsuki')"  data-i18n-title="theme.tsuki" ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
        </div>
      </div>
    </div>

    <div class="set-group">
      <h4 data-i18n="settings.typography">タイポグラフィ</h4>
      <div class="set-row">
        <span class="set-label" data-i18n="settings.font">フォント</span>
        <div id="font-picker">
          <button id="font-picker-btn" type="button" onclick="toggleFontPicker()" aria-expanded="false">
            <span id="font-picker-label"></span><span id="font-picker-arrow">▾</span>
          </button>
          <div id="font-picker-list"></div>
        </div>
      </div>
      <div class="set-row">
        <span class="set-label" data-i18n="settings.fontSize">文字サイズ</span>
        <div class="btn-group">
          <button onclick="changeFontSize(-1)">A-</button>
          <span id="font-size-display">100%</span>
          <button onclick="changeFontSize(1)">A+</button>
        </div>
      </div>
      <div class="set-row">
        <span class="set-label" data-i18n="settings.lineHeight">行間</span>
        <select class="modern-select" id="lineh-select" onchange="changeLineHeight(this.value)">
          <option value="1.6" data-i18n="lh.narrow">狭い</option>
          <option value="2.0" selected data-i18n="lh.normal">標準</option>
          <option value="2.4" data-i18n="lh.wide">広い</option>
          <option value="2.8" data-i18n="lh.veryWide">かなり広い</option>
        </select>
      </div>
    </div>

    <div class="set-group">
      <h4 data-i18n="settings.layout">レイアウト</h4>
      <div class="set-row">
        <span class="set-label" data-i18n="settings.writingMode">組方向</span>
        <select class="modern-select" id="writing-mode-select" onchange="changeWritingMode(this.value)">
          <option value="vertical" data-i18n="wm.vertical">縦書き</option>
          <option value="horizontal" data-i18n="wm.horizontal">横書き</option>
          <option value="publisher" data-i18n="wm.publisher">ePub指定</option>
        </select>
      </div>
      <div class="set-row">
        <span class="set-label" data-i18n="settings.margin">ページ余白</span>
        <select class="modern-select" id="margin-select" onchange="changeMargin(this.value)">
          <option value="full" data-i18n="margin.full">標準</option>
          <option value="medium" data-i18n="margin.medium">中</option>
          <option value="narrow" data-i18n="margin.narrow">狭</option>
          <option value="none" data-i18n="margin.none">なし</option>
        </select>
      </div>
      <div class="set-row">
        <span class="set-label" data-i18n="settings.fwdBtnSize">次へボタン</span>
        <select class="modern-select" id="fwd-btn-size-select" onchange="changeFwdBtnSize(this.value)">
          <option value="small" data-i18n="fwdSize.small">小</option>
          <option value="medium" data-i18n="fwdSize.medium">中</option>
          <option value="large" data-i18n="fwdSize.large">大</option>
        </select>
      </div>
    </div>

    <div class="set-group" id="drive-auto-group">
      <h4 data-i18n="settings.driveGroup">Google Drive</h4>

function t(key, vars) {
  const dict = I18N[_lang] || I18N['ja'];
  let str = key in dict ? dict[key] : (I18N['ja'][key] || key);
  if (vars) {
    for (const [k, v] of Object.entries(vars))
      str = str.replaceAll('{' + k + '}', String(v));
  }
  return str;
}

function initLang() {
  const stored = localStorage.getItem('epub_lang');
  if (stored && stored in I18N) { _lang = stored; return; }
  const nav = navigator.language || 'ja';
  if      (nav.startsWith('zh-TW') || nav.startsWith('zh-Hant')) _lang = 'zh-TW';
  else if (nav.startsWith('zh'))                                   _lang = 'zh-CN';
  else if (nav.startsWith('en'))                                   _lang = 'en';
  else                                                             _lang = 'ja';
}

function setLang(lang) {
  if (!(lang in I18N)) return;
  _lang = lang;
  try { localStorage.setItem('epub_lang', lang); } catch(e) {}
  applyI18n();
  if (document.getElementById('modal-overlay').classList.contains('show')) {
    updateHelpContent();
  }
}

function applyI18n() {
  document.documentElement.lang = _lang;
  document.title = t('app.title');
  if (!state.epub) document.getElementById('book-title').textContent = t('app.title');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    'i18nHtml' in el.dataset
      ? (el.innerHTML = t(el.dataset.i18n))
      : (el.textContent = t(el.dataset.i18n));
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.title = t(el.dataset.i18nTitle);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  document.querySelectorAll('.lang-select').forEach(s => { s.value = _lang; });
  updateFontPickerUI();
  if (document.getElementById('font-picker-list').classList.contains('open')) {
    buildFontPickerList();
  }
}

document.body.addEventListener('drop', async e => {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('dragover');
  let fileHandle = null;
  let f = null;
  // File System Access API が使える場合はハンドルも取得する
  if (window.showOpenFilePicker && e.dataTransfer.items?.[0]) {
    try {
      const h = await e.dataTransfer.items[0].getAsFileSystemHandle();
      if (h?.kind === 'file') { fileHandle = h; f = await fileHandle.getFile(); }
    } catch(_) {}
  }
  if (!f) f = e.dataTransfer.files[0];
  if (f && (f.name.endsWith('.epub') || f.name.endsWith('.kepub'))) loadEpub(f, fileHandle);
});

async function loadEpub(file, fileHandle = null) {
  try {
    const zip = await JSZip.loadAsync(file);
    state.epub = zip;

    // container.xml → OPF path
    const containerEntry = zip.file('META-INF/container.xml');
    if (!containerEntry) throw new Error(t('err.noContainerXml'));
    const cXml = await containerEntry.async('text');
    const cDoc = new DOMParser().parseFromString(cXml, 'application/xml');
    const rootfileEl = cDoc.querySelector('rootfile');
    if (!rootfileEl) throw new Error(t('err.noRootfile'));
    state.opfPath = rootfileEl.getAttribute('full-path');
    if (!state.opfPath) throw new Error(t('err.noFullPath'));
    state.opfDir  = state.opfPath.includes('/') ? state.opfPath.slice(0, state.opfPath.lastIndexOf('/')+1) : '';

    // OPF
    const opfEntry = zip.file(state.opfPath);
    if (!opfEntry) throw new Error(t('err.noOpf', {path: state.opfPath}));
    const opfXml = await opfEntry.async('text');
    const opfDoc = new DOMParser().parseFromString(opfXml, 'application/xml');

    // manifest
    state.manifest = {};
    opfDoc.querySelectorAll('manifest item').forEach(item => {
      const id = item.getAttribute('id');
      state.manifest[id] = {
        href: item.getAttribute('href'),
        mediaType: item.getAttribute('media-type'),
        absPath: state.opfDir + item.getAttribute('href'),
      };
    });

    // spine
    state.spine = [];
    opfDoc.querySelectorAll('spine itemref').forEach(ref => {
      const item = state.manifest[ref.getAttribute('idref')];
      if (item) state.spine.push(item);
    });

    // TOC from nav doc
    state.toc = [];
    const navEl = [...opfDoc.querySelectorAll('manifest item')]
      .find(i => (i.getAttribute('properties')||'').includes('nav'));
    if (navEl) {
      const navItem = state.manifest[navEl.getAttribute('id')];
      if (navItem) {
        const navFile = zip.file(navItem.absPath);
        if (!navFile) { console.warn('TOC file missing:', navItem.absPath); }
        const navXml = navFile ? await navFile.async('text') : '';
        // Parse as HTML (lenient)
        const navDoc = new DOMParser().parseFromString(navXml, 'text/html');
        navDoc.querySelectorAll('nav a').forEach(a => {
          const label = a.textContent.trim();
          const href  = a.getAttribute('href');
          if (label && href) state.toc.push({label, href});
        });
      }
    }

    // UI
    const titleEl = opfDoc.querySelector('metadata > *|title, metadata > title');
    const titleText = titleEl ? titleEl.textContent : file.name;
    state.bookTitle = titleText;
    state.bookCreator = [...opfDoc.querySelectorAll('metadata > *|creator, metadata > creator')]
      .map(el => el.textContent.trim()).filter(Boolean).join('・');
    document.getElementById('book-title').textContent = titleText;
    state.bookKey = 'epub_pos_' + titleText + '_' + state.spine.length;

    // 表紙サムネイル抽出（非同期、失敗しても続行）
    state.bookCoverDataUri = '';
    try { state.bookCoverDataUri = await extractCoverThumb(opfDoc) || ''; } catch(e) {}
    saveBookMeta();

    // File System Access API: ハンドルを IDB に保存（Chrome/Edge のみ）
    if (fileHandle && window.showOpenFilePicker) {
      fshPut(state.bookKey, fileHandle).then(() => {
        _handleKeys.add(state.bookKey);
      }).catch(() => {});
    }

    document.getElementById('welcome').style.display = 'none';
    document.getElementById('page-container').classList.add('visible');
    updateCloseBookBtnVisibility();
    buildTocList();
    // 最終書名をlocalStorageに保存（レジューム表示用）
    try { localStorage.setItem('epub_last_book', JSON.stringify({ title: titleText, bookKey: state.bookKey })); } catch(e) {}
    _originalBookmark = null;
    _jumpHistory = [];
    _bookFinished = false;
    resetSearch();
    switchSidebarTab('toc');
    document.getElementById('search-input').disabled = false;
    document.getElementById('search-btn').disabled = false;
    const saved = loadSavedPos();
    if (saved && saved.spineIdx > 0 && saved.spineIdx < state.spine.length) {
      _originalBookmark = {spineIdx: saved.spineIdx, ratio: typeof saved.ratio === 'number' ? saved.ratio : 0};
    }
    updateJumpHistoryUI();
    if (saved && saved.spineIdx > 0 && saved.spineIdx < state.spine.length) {
      if (state.sidebarOpen) toggleSidebar();
      await renderPage(saved.spineIdx, typeof saved.ratio === 'number' ? saved.ratio : 'start');
      showToast(t('toast.resume', {n: saved.spineIdx + 1, total: state.spine.length}));
      flashNavButtons();
    } else {
      await renderPage(0);
      flashNavButtons();
    }

  } catch(err) {
    alert(t('err.loadFailed', {msg: err.message}));
    console.error(err);
  }
}

// ══════════════════════════════════════════
//  TOC
// ══════════════════════════════════════════
function buildTocList() {
  const list = document.getElementById('toc-list');
  list.innerHTML = '';
  state.toc.forEach(item => {
    const div = document.createElement('div');
    div.className = 'toc-item';
    div.textContent = item.label;
    div.onclick = () => navigateToToc(item.href);
    list.appendChild(div);
  });
}
function navigateToToc(href) {
  const hash = href.includes('#') ? '#' + href.split('#')[1] : null;
  const base = href.split('#')[0];
  if (!base) return;
  const idx = state.spine.findIndex(s =>
    s.href === base ||
    s.absPath === state.opfDir + base ||
    s.absPath.endsWith('/' + base)
  );
  if (idx >= 0) { pushJumpHistory(); renderPage(idx, hash || 'start'); }
}
function updateTocHighlight() {
  const cur = state.spine[state.currentSpineIdx];
  document.querySelectorAll('.toc-item').forEach((el, i) => {
    const th = (state.toc[i]?.href || '').split('#')[0];
    el.classList.toggle('current',
      cur && (cur.href === th || cur.absPath === state.opfDir+th || cur.absPath.endsWith('/'+th))
    );
  });
}

// ══════════════════════════════════════════
//  Resource Resolution → data: URI
// ══════════════════════════════════════════
function resolvePath(baseDir, rel) {
  if (!rel || rel.startsWith('http') || rel.startsWith('data:') || rel.startsWith('blob:')) return rel;
  if (rel.startsWith('/')) return rel.slice(1);
  const parts = (baseDir + rel).split('/');
  const out = [];
  for (const p of parts) {
    if (p === '..') out.pop();
    else if (p && p !== '.') out.push(p);
  }
  return out.join('/');
}

const EXT_MIME = {
  ttf:'font/ttf', otf:'font/otf', woff:'font/woff', woff2:'font/woff2',
  jpg:'image/jpeg', jpeg:'image/jpeg', png:'image/png',
  gif:'image/gif', webp:'image/webp', svg:'image/svg+xml',
};

async function toDataUri(absPath) {
  const f = state.epub.file(absPath);
  if (!f) return null;
  const ext = absPath.split('.').pop().toLowerCase();
  const mime = EXT_MIME[ext] || 'application/octet-stream';
  const b64 = await f.async('base64');
  return 'data:' + mime + ';base64,' + b64;
}

async function resolveCssText(css, cssDir) {
  // url('...') or url(...)
  const re = /url\(\s*(['"]?)([^'"\)\s]+)\1\s*\)/g;
  const hits = [];
  let m;
  while ((m = re.exec(css)) !== null) hits.push({full:m[0], src:m[2]});
  for (const {full, src} of hits) {
    if (src.startsWith('data:') || src.startsWith('http') || src.startsWith('blob:')) continue;
    const uri = await toDataUri(resolvePath(cssDir, src));
    if (uri) {
      // full は正規表現マッチ済み文字列。特殊文字をエスケープして全出現箇所を置換
      const escapedFull = full.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      css = css.replace(new RegExp(escapedFull, 'g'), "url('" + uri + "')");
    }
  }
  return css;
}

// Parse xhtml/html text, resolve all resources, return HTML string ready for srcdoc
async function buildSrcdoc(xhtmlText, xhtmlAbsPath, scrollTarget, readySeq) {
  const dir = xhtmlAbsPath.includes('/')
    ? xhtmlAbsPath.slice(0, xhtmlAbsPath.lastIndexOf('/')+1)
    : '';

  // Fix XHTML self-closing non-void elements before HTML5 parsing.
  // XHTML allows <script src="..."/> but HTML5 treats it as an unclosed tag,
  // consuming all subsequent markup as raw text → empty body → blank page.
  // Expand self-closing script/style tags to their open+close form first.
  xhtmlText = xhtmlText.replace(/<(script|style)(\s[^>]*)?\s*\/>/gi,
    (_, tag, attrs) => '<' + tag + (attrs || '') + '></' + tag + '>');

  // Always parse as text/html – avoids XML strict errors entirely
  const doc = new DOMParser().parseFromString(xhtmlText, 'text/html');

  // ── ePub 内の <script> を除去（XSS 対策）
  //    srcdoc iframe には sandbox がないため、ePub 由来のスクリプトが
  //    localStorage 等にアクセスできてしまう
  doc.querySelectorAll('script').forEach(s => s.remove());

  // ── <base href="about:blank"> を先頭に挿入
  //    srcdoc の base URL は親ページ(file://)を継承するため、
  //    ePub内の未解決の相対URLが file://yomikake.html に解決されないよう上書きする
  doc.querySelectorAll('base').forEach(b => b.remove());
  const safeBase = doc.createElement('base');
  safeBase.setAttribute('href', 'about:blank');
  doc.head.insertBefore(safeBase, doc.head.firstChild);

  // ── Resolve <link rel="stylesheet"> → inline <style>
  for (const link of [...doc.querySelectorAll('link[rel="stylesheet"]')]) {
    const href = link.getAttribute('href') || '';
    if (href.startsWith('data:') || href.startsWith('http')) continue;
    const absPath = resolvePath(dir, href);
    const f = state.epub.file(absPath);
    if (!f) { link.remove(); continue; }
    const cssDir = absPath.includes('/') ? absPath.slice(0, absPath.lastIndexOf('/')+1) : '';
    let css = await f.async('text');
    css = await resolveCssText(css, cssDir);
    const style = doc.createElement('style');
    style.textContent = css;
    link.parentNode.replaceChild(style, link);
  }

  // ── Resolve <style> blocks
  for (const style of [...doc.querySelectorAll('style')]) {
    style.textContent = await resolveCssText(style.textContent, dir);
  }

  // ── Resolve <img src>
  for (const img of [...doc.querySelectorAll('img')]) {
    const src = img.getAttribute('src') || '';
    if (!src || src.startsWith('data:') || src.startsWith('http')) continue;
    const uri = await toDataUri(resolvePath(dir, src));
    if (uri) img.setAttribute('src', uri);
  }

  // ── Resolve SVG <image xlink:href> / <image href> (manga / image ePub)
  //    DOMParser('text/html') recognises inline SVG, so querySelectorAll('image')
  //    finds SVG image elements. xlink:href needs getAttributeNS; href is SVG 2.0.
  for (const svgImg of [...doc.querySelectorAll('image')]) {
    const xlinkNS = 'http://www.w3.org/1999/xlink';
    const xhref = svgImg.getAttributeNS(xlinkNS, 'href') || svgImg.getAttribute('xlink:href') || '';
    const href  = svgImg.getAttribute('href') || '';
    const src   = xhref || href;
    if (!src || src.startsWith('data:') || src.startsWith('http')) continue;
    const uri = await toDataUri(resolvePath(dir, src));
    if (!uri) continue;
    if (xhref) svgImg.setAttributeNS(xlinkNS, 'xlink:href', uri);
    svgImg.setAttribute('href', uri);  // SVG 2.0 href (set regardless of xlink presence)
  }

  // ── Resolve inline style url()
  for (const el of [...doc.querySelectorAll('[style]')]) {
    const s = el.getAttribute('style') || '';
    if (s.includes('url(')) el.setAttribute('style', await resolveCssText(s, dir));
  }

  // ── Inject viewer override styles
  const font   = FONTS[state.fontMode];
  const colors = THEME_CONTENT[state.theme] || THEME_CONTENT[''];
  const paper  = colors.paper;
  const text   = colors.text;
  const fontImport = FONT_URLS[state.fontMode]
    ? '@import url(\'' + FONT_URLS[state.fontMode] + '\');\n'
    : '';
  const fontRule = font
    ? 'html,body,p,h1,h2,h3,h4,h5,h6,div,span{font-family:' + font + '!important;}'
    : '';
  const overrideStyle = doc.createElement('style');
  overrideStyle.id = 'epub-viewer-inject';
  const wm = state.writingMode;
  // Build writing-mode overrides and blank-end-page padding per mode.
  // 'vertical'  : force vertical-rl + padding-left:100vw (blank page at reading end)
  // 'horizontal': force horizontal-tb + padding-bottom:100vh (blank page at bottom)
  // 'publisher' : no CSS override — blank-end-page padding injected via JS in applyInit() after axis detection
  const wmHtml = wm === 'vertical'
    ? 'writing-mode:vertical-rl!important;-webkit-writing-mode:vertical-rl!important;padding-left:100vw!important;height:100%!important;overflow-y:hidden!important;scrollbar-width:none!important;'
    : wm === 'horizontal'
      ? 'writing-mode:horizontal-tb!important;-webkit-writing-mode:horizontal-tb!important;padding-bottom:100vh!important;'
      : 'height:100%!important;';  // publisher: full-height prevents ePub-fixed column-height collapse
  const vertPad = (state.margin === 'narrow' || state.margin === 'none') ? '0.25em' : '0.5em';
  const wmBody = wm === 'vertical'
    ? 'writing-mode:vertical-rl!important;-webkit-writing-mode:vertical-rl!important;margin:0!important;height:100%!important;overflow-y:hidden!important;box-sizing:border-box!important;padding-bottom:' + vertPad + '!important;'
    : wm === 'horizontal'
      ? 'writing-mode:horizontal-tb!important;-webkit-writing-mode:horizontal-tb!important;'
      : 'height:100%!important;';  // publisher: match html full-height
  overrideStyle.textContent = fontImport + [
    'html,body{background:' + paper + '!important;color:' + text + '!important;}',
    'html{font-size:' + state.fontSize + '%!important;line-height:' + state.lineHeight + '!important;' + wmHtml + '}',
    'body{' + wmBody + 'line-height:' + state.lineHeight + '!important;}',
    wm === 'vertical' ? 'html::-webkit-scrollbar{display:none!important;}' : '',
    'img{max-width:100%!important;max-height:95vh!important;object-fit:contain!important;}',
    'svg{max-width:100%!important;max-height:95vh!important;}',  // scale down full-page SVG in manga/image ePub
    fontRule,
  ].join('');
  doc.head.appendChild(overrideStyle);

  // ── Inject scroll controller script
  //    (baked-in scrollTarget avoids any async race)
  const scrollScript = doc.createElement('script');
  scrollScript.textContent = buildScrollScript(scrollTarget, state.writingMode, readySeq);
  doc.body.appendChild(scrollScript);

  return '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
}

function buildScrollScript(scrollTarget, writingMode, readySeq) {

    '  window.addEventListener("message", function(ev){',
    '    if(!ev.data || ev.data.type !== "EPUB_SCROLL") return;',
    '    doScroll(ev.data.direction);',
    '  });',

    '    var a = ev.target.closest("a");',
    '    if(!a) return;',
    '    var href = a.getAttribute("href") || "";',
    '    if(!href) return;',

    '    if(href.startsWith("#")){ return; }',

    '      // Fix Chrome text-combine-upright initial-paint misposition.',

      '(function(){',
      '  var STEP = 0.92;',
      '  var initTarget = ' + t + ';',

      '    var e = root(), sh = e.scrollHeight, vh = e.clientHeight;',

      '      e.scrollTop = sh > 2*vh ? sh - 2*vh : 0;',

      '      var anchorEl = document.getElementById(anchorId);',
      '      if(!anchorEl){ var ns = document.getElementsByName(anchorId); if(ns.length) anchorEl = ns[0]; }',
      '      if(anchorEl){ anchorEl.scrollIntoView({behavior:"instant",block:"start",inline:"nearest"}); }',
      '      else { e.scrollTop = 0; }',
      '    } else { e.scrollTop = 0; }',
      '  }',
      '  function doScroll(dir){',
      '    var e = root(), vh = e.clientHeight, sh = e.scrollHeight;',

      '    if(sh <= 2*vh){ window.parent.postMessage({type:"EPUB_EDGE",direction:dir},"*"); return; }',

      '    var maxSReal = sh - 2*vh, maxS = sh - vh;',

      '      else if(typeof initTarget === "number"){ if(sh>2*vh) e.scrollTop = initTarget*(sh-2*vh); }',
      '      else if(typeof initTarget === "string" && initTarget.charAt(0) === "#"){',
      '        var anchorId = initTarget.slice(1);',
      '        var anchorEl = document.getElementById(anchorId);',
      '        if(!anchorEl){ var ns = document.getElementsByName(anchorId); if(ns.length) anchorEl = ns[0]; }',
      '        if(anchorEl){ anchorEl.scrollIntoView({behavior:"instant",block:"start",inline:"nearest"}); }',
      '        else { e.scrollTop = 0; }',
      '      } else { e.scrollTop = 0; }',
      '    }',
      '  }',
      '  function doScroll(dir){',
      '    var e = root(), step, cur;',
      '    if(axis() === "h"){',
      '      var vw = e.clientWidth, sw = e.scrollWidth;',
      '      var max = sw - vw;         // 絶対スクロール限界（余白の最深部）',
      '      var contentMax = sw - 2*vw; // 本文終端。これを超えると余白ゾーン',
      '      if(sw <= 2*vw){ window.parent.postMessage({type:"EPUB_EDGE",direction:dir},"*"); return; }',
      '      step = vw*STEP; cur = e.scrollLeft;',
      '      if(isNeg()){',
      '        if(dir===1){ if(cur<=-(contentMax)-2){ window.parent.postMessage({type:"EPUB_EDGE",direction:1},"*"); return; } e.scrollLeft=Math.max(cur-step,-max); }',
      '        else       { if(cur>=-2){              window.parent.postMessage({type:"EPUB_EDGE",direction:-1},"*"); return; } e.scrollLeft=Math.min(cur+step,0); }',
      '      } else {',
      '        if(dir===1){ if(cur>=contentMax+2){ window.parent.postMessage({type:"EPUB_EDGE",direction:1},"*"); return; } e.scrollLeft=Math.min(cur+step,max); }',

      '      }',
      '    } else {',
      '      var vh = e.clientHeight, sh = e.scrollHeight;',
      '      var maxSReal = sh - 2*vh, maxS = sh - vh;',
      '      if(sh <= 2*vh){ window.parent.postMessage({type:"EPUB_EDGE",direction:dir},"*"); return; }',
      '      step = vh*STEP; cur = e.scrollTop;',
      '      if(dir===1){ if(cur>=maxSReal+2){ window.parent.postMessage({type:"EPUB_EDGE",direction:1},"*"); return; } e.scrollTop=Math.min(cur+step,maxS); }',
      '      else       { if(cur<=2){          window.parent.postMessage({type:"EPUB_EDGE",direction:-1},"*"); return; } e.scrollTop=Math.max(cur-step,0); }',
      '    }',
      '  }',
      '  function reportPos(){',
      '    var e = root(), ratio;',
      '    if(axis() === "h"){',
      '      var sw = e.scrollWidth, vw = e.clientWidth;',

      '      var sh = e.scrollHeight, vh = e.clientHeight;',
      '      if(sh <= 2*vh){ window.parent.postMessage({type:"EPUB_POS",ratio:0},"*"); return; }',

  // getX: Chrome-neg → -scrollLeft、Firefox-pos → (sw-vw)-scrollLeft。
  // setX: Chrome-neg → scrollLeft=-x、Firefox-pos → scrollLeft=(sw-vw)-x。
  // isNeg() は applyInit() の先頭で scrollLeft 代入前にキャッシュする。
  return [
    '(function(){',
    '  var STEP = 0.92;',
    '  var initTarget = ' + t + ';',
    '  function root(){ return document.documentElement; }',
    '  var _neg = null;',
    '  function isNeg(){',
    '    if(_neg !== null) return _neg;',
    '    var e = root();',
    '    if(e.scrollWidth <= e.clientWidth){ return false; }',
    '    _neg = (e.scrollLeft <= 0); return _neg;',
    '  }',
    '  function getX(e){',
    '    var sw = e.scrollWidth, vw = e.clientWidth;',
    '    return isNeg() ? -e.scrollLeft : (sw - vw - e.scrollLeft);',
    '  }',
    '  function setX(e, x){',
    '    var sw = e.scrollWidth, vw = e.clientWidth;',
    '    e.scrollLeft = isNeg() ? -x : (sw - vw - x);',
    '  }',
    '  function reportPos(){',
    '    var e = root(), sw = e.scrollWidth, vw = e.clientWidth;',
    '    var range = sw - 2*vw;',
    '    if(range <= 0){ window.parent.postMessage({type:"EPUB_POS",ratio:0},"*"); return; }',
    '    var ratio = Math.max(0, Math.min(1, getX(e) / range));',
    '    window.parent.postMessage({type:"EPUB_POS",ratio:ratio},"*");',
    '  }',
    '  function applyInit(){',
    '    var e = root(), sw = e.scrollWidth, vw = e.clientWidth;',
    '    isNeg(); // scrollLeft 代入前に自然位置でキャッシュ',
    '    if(initTarget === "end"){',
    '      setX(e, sw - 2*vw);',
    '    } else if(typeof initTarget === "number"){',
    '      var range = sw - 2*vw;',
    '      if(range > 0) setX(e, Math.round(initTarget * range));',
    '    } else if(typeof initTarget === "string" && initTarget.charAt(0) === "#"){',
    '      var anchorId = initTarget.slice(1);',
    '      var anchorEl = document.getElementById(anchorId);',
    '      if(!anchorEl){ var ns = document.getElementsByName(anchorId); if(ns.length) anchorEl = ns[0]; }',
    '      if(anchorEl){ anchorEl.scrollIntoView({behavior:"instant",block:"start",inline:"nearest"}); }',
    '      else { setX(e, 0); }',
    '    } else {',
    '      setX(e, 0);',
    '    }',
    '  }',
    '  function doScroll(dir){',
    '    var e = root(), sw = e.scrollWidth, vw = e.clientWidth;',
    '    var max = sw - vw;         // 絶対スクロール限界（余白の最深部）',
    '    var contentMax = sw - 2*vw; // 本文終端。これを超えると余白ゾーン',
    '    if(sw <= 2*vw){ window.parent.postMessage({type:"EPUB_EDGE",direction:dir},"*"); return; }',
    '    var x = getX(e);',
    '    // 余白ゾーン内に既にいる場合は EPUB_EDGE を発火（前のスクロールで余白を表示済み）',
    '    if(dir === 1 && x >= contentMax + 2){',
    '      window.parent.postMessage({type:"EPUB_EDGE",direction:1},"*"); return;',
    '    }',
    '    if(dir === -1 && x <= 2){',
    '      window.parent.postMessage({type:"EPUB_EDGE",direction:-1},"*"); return;',
    '    }',
    '    var step = vw * STEP;',
    '    var newX;',
    '    if(dir === 1){',
    '      newX = x + step;',
    '      if(newX > contentMax){',
    '        // 余白ゾーン突入：本文末尾＋余白が同時に見えるよう step ベースで clamp',
    '        // （max = sw-vw に設定すると全余白になるため、step 加算値をそのまま使う）',
    '        newX = Math.min(newX, max);',
    '      } else {',
    '        // 通常ページ内：ページ境界にスナップして読みやすさを保持',
    '        newX = Math.round(newX / vw) * vw;',
    '      }',
    '    } else {',
    '      newX = Math.max(x - step, 0);',
    '      newX = Math.round(newX / vw) * vw;',
    '    }',
    '    setX(e, newX);',
    '    reportPos();',
    '  }',
    ...SHARED_TAIL,
  ].join('\n');
}


// ══════════════════════════════════════════
//  Render Page
// ══════════════════════════════════════════
let _renderSeq = 0;
let _isRendering = false;          // true: srcdoc 未コミット（旧 iframe が残存中）
let _pendingScrollAfterRender = 0; // 描画中に受け取ったスクロール方向をキュー
let _intraChapterRatio = 0;        // 章内スクロール比率（0–1）プログレスバー表示用
let _originalBookmark  = null;     // {spineIdx, ratio} | null — 開いた時のしおり位置
let _jumpHistory       = [];       // [{spineIdx, ratio}] 直近4件のジャンプ前位置（新しい順）
let _bookFinished      = false;    // 最終章末尾到達フラグ（closeBook で ratio=0 上書き防止）
let _handleKeys        = new Set();// File System Access API: handle を持つ bookKey の集合
let _editMode          = false;    // 読みかけリスト編集モード
let _sidebarTab        = 'toc';    // 'toc' | 'search' — サイドバーの現在タブ
let _searching         = false;    // 検索実行中
let _searchAbort       = false;    // 検索中止フラグ（後方互換のため残存、実質 _searchSeq で代替）
let _searchSeq         = 0;        // 検索シーケンス番号（新検索開始でインクリメント）

async function renderPage(idx, scrollTarget) {
  if (!state.epub || idx < 0 || idx >= state.spine.length) return;
  if (scrollTarget === undefined) scrollTarget = 'start';
  dismissFinishedBanner();
  const seq = ++_renderSeq;
  _isRendering = true;
  _intraChapterRatio = 0;
  state.publisherAxis = null; // 新章の axis 検出まで不定とする
  state.currentSpineIdx = idx;
  flashOverlay();
  // 章遷移時に開始位置を即時保存。applyInit() では scrollLeft が変化しない場合に
  // scroll イベントが起きず EPUB_POS が送信されないため、アプリを閉じると
  // 前章末尾位置が残ったまま復元される問題を防ぐ。
  savePos(scrollTarget === 'end' ? 1.0 : typeof scrollTarget === 'number' ? scrollTarget : 0);

  const spineItem = state.spine[idx];
  const spineFile = state.epub.file(spineItem.absPath);
  if (!spineFile) { _isRendering = false; showToast(t('toast.fileMissing', {path: spineItem.absPath})); return; }
  const xhtmlText = await spineFile.async('text');
  if (seq !== _renderSeq) { return; }
  const srcdoc = await buildSrcdoc(xhtmlText, spineItem.absPath, scrollTarget, seq);
  if (seq !== _renderSeq) { return; }

  const iframe = document.getElementById('content-iframe');
  // Setting srcdoc directly – no blob URL, no origin issue
  iframe.srcdoc = srcdoc;
  // _isRendering は iframe の applyInit() 完了後に送られる EPUB_READY で false にする。
  // ここでは false にしない（旧 iframe からの遅延 EPUB_EDGE や applyInit 前の doScroll による
  // 誤チャプタースキップを防ぐため）。

  updatePageInfo();
  updateTocHighlight();
}

// ══════════════════════════════════════════
//  Navigation
// ══════════════════════════════════════════
function nextChapter() {
  if (state.currentSpineIdx < state.spine.length-1) renderPage(state.currentSpineIdx+1, 'start');
}
function prevChapter() {
  if (state.currentSpineIdx > 0) renderPage(state.currentSpineIdx-1, 'start');
}

function scrollPage(direction) {
  const iframe = document.getElementById('content-iframe');
  if (iframe.contentWindow) {
    iframe.contentWindow.postMessage({type:'EPUB_SCROLL', direction}, '*');
  }
}

// Messages from iframe: chapter edge detection & scroll position reporting
window.addEventListener('message', e => {
  // 自分の iframe からのメッセージのみ受け付ける（他のウィンドウ・拡張機能からの不正メッセージを排除）
  const iframe = document.getElementById('content-iframe');
  if (!iframe || e.source !== iframe.contentWindow) return;
  if (!e.data) return;
  if (e.data.type === 'EPUB_READY') {
    // iframe の applyInit() 完了後に届く。レンダリング完了を確認して _isRendering を解除し、
    // 連打分のペンディングスクロールを安全に適用する。
    // seq が一致しない場合は古い（supersedeされた）チャプターからのメッセージなので無視。
    if (e.data.seq !== _renderSeq) return;
    _isRendering = false;
    const pendingDir = _pendingScrollAfterRender;
    _pendingScrollAfterRender = 0;
    if (pendingDir !== 0) scrollPage(pendingDir);
    return;
  }
  if (e.data.type === 'EPUB_EDGE') {
    const dir = e.data.direction;
    if (_isRendering) {
      // 旧 iframe からの EPUB_EDGE：章送りせずスクロールをキューして次チャプター冒頭で1ページ進める
      _pendingScrollAfterRender = dir;
      return;
    }
    if (dir === 1 && state.currentSpineIdx < state.spine.length - 1) {
      renderPage(state.currentSpineIdx + 1, 'start');
    } else if (dir === 1 && state.currentSpineIdx === state.spine.length - 1) {
      savePos(1.0);
      showFinishedBanner();
    }
    if (dir === -1 && state.currentSpineIdx > 0) renderPage(state.currentSpineIdx - 1, 'end');
  }
  if (e.data.type === 'EPUB_POS') {
    // _isRendering 中は旧 iframe からの遅延 EPUB_POS を無視し、
    // 新章インデックスに古い ratio が上書きされるのを防ぐ
    if (!_isRendering) {
      _intraChapterRatio = e.data.ratio;
      savePos(e.data.ratio);
      updatePageInfo();
    }
  }
  if (e.data.type === 'EPUB_LINK') {
    handleIframeLink(e.data.href);
  }
  if (e.data.type === 'EPUB_AXIS') {
    state.publisherAxis = e.data.axis;
    updatePageInfo();
  }
});

function handleIframeLink(href) {
  const hash   = href.includes('#') ? '#' + href.split('#')[1] : null;
  const base   = href.split('#')[0];
  if (!base) return; // anchor-only (#id) on same page — no-op
  if (/^javascript:/i.test(base)) return; // javascript: スキームは拒否
  const curItem = state.spine[state.currentSpineIdx];
  const curDir  = curItem.absPath.includes('/')
    ? curItem.absPath.slice(0, curItem.absPath.lastIndexOf('/') + 1)
    : '';
  const absTarget = resolvePath(curDir, base);
  const idx = state.spine.findIndex(s => s.absPath === absTarget);
  if (idx >= 0) renderPage(idx, hash || 'start');
}

function flashOverlay() {
  const o = document.getElementById('page-overlay');
  o.classList.add('flash');
  setTimeout(() => o.classList.remove('flash'), 150);
}
function flashNavButtons() {
  const btns = document.querySelectorAll('.chapter-btn, .scroll-btn');
  btns.forEach(b => b.classList.add('nav-hint'));
  setTimeout(() => {
    btns.forEach(b => b.classList.remove('nav-hint'));
  }, 3500);
}
// 縦書き（vertical-rl）軸かどうかを返す。
// publisher モードは iframe から EPUB_AXIS メッセージで検出した軸を参照する。
function isVerticalAxis() {
  return state.writingMode === 'vertical' ||
    (state.writingMode === 'publisher' && state.publisherAxis === 'h');
}
function updatePageInfo() {
  const total = state.spine.length, cur = state.currentSpineIdx+1;
  document.getElementById('page-info').textContent = cur + ' / ' + total;
  const fill = document.getElementById('progress-fill');
  const pct = total > 1 ? Math.min(100, (cur - 1 + _intraChapterRatio) / (total - 1) * 100) : 100;
  fill.style.width = pct + '%';
  // 縦書きは右→左方向に読み進めるためバーを右端起点に
  fill.style.marginLeft = isVerticalAxis() ? 'auto' : '';
}

// ══════════════════════════════════════════
//  Progress Bar — クリックジャンプ & ツールチップ
// ══════════════════════════════════════════
(function () {
  const bar     = document.getElementById('progress-bar');
  const tooltip = document.getElementById('progress-tooltip');

  function ratioFromEvent(e) {
    const rect = bar.getBoundingClientRect();
    const raw = (e.clientX - rect.left) / rect.width;
    return isVerticalAxis() ? 1 - raw : raw;
  }
  function idxFromRatio(ratio) {
    const total = state.spine.length;
    return Math.round(Math.max(0, Math.min(ratio, 1)) * (total - 1));
  }

  bar.addEventListener('click', e => {
    if (!state.epub || state.spine.length < 2) return;
    pushJumpHistory();
    renderPage(idxFromRatio(ratioFromEvent(e)), 'start');
  });

  bar.addEventListener('mousemove', e => {
    if (!state.epub || state.spine.length < 2) { tooltip.classList.remove('show'); return; }
    const idx   = idxFromRatio(ratioFromEvent(e));
    const rect  = bar.getBoundingClientRect();
    tooltip.textContent  = t('progress.tooltip', { n: idx + 1, total: state.spine.length });
    tooltip.style.left   = e.clientX + 'px';
    tooltip.style.top    = rect.top + 'px';
    tooltip.classList.add('show');
  });

  bar.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
})();

// ══════════════════════════════════════════
//  Keyboard
// ══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
  switch(e.key) {
    case ' ':
      e.shiftKey ? scrollPage(-1) : scrollPage(1);
      e.preventDefault(); break;
    case 'ArrowDown': case 'PageDown':
      scrollPage(1); e.preventDefault(); break;
    case 'ArrowUp': case 'PageUp':
      scrollPage(-1); e.preventDefault(); break;
    case 'ArrowLeft':
      nextChapter(); e.preventDefault(); break;
    case 'ArrowRight':
      prevChapter(); e.preventDefault(); break;
    case 'Home':
      renderPage(0, 'start'); e.preventDefault(); break;
    case 'End':
      renderPage(state.spine.length-1, 'end'); e.preventDefault(); break;
    case 'f':
      toggleFullscreen(); e.preventDefault(); break;
    case 'Escape':
      if (state.fullscreen) { toggleFullscreen(); e.preventDefault(); } break;
  }
});

// ══════════════════════════════════════════
//  Settings
// ══════════════════════════════════════════
const SETTINGS_KEY = 'epub_settings';

function saveSettings() {
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({
      fontMode:      state.fontMode,
      fontSize:      state.fontSize,
      lineHeight:    state.lineHeight,
      theme:         state.theme,
      margin:        state.margin,
      writingMode:   state.writingMode,
      fwdBtnSize:    state.fwdBtnSize,
      driveAutoSave: state.driveAutoSave,
    }));
  } catch(e) {
    notifyStorageError();
  }
}

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY));
    if (!s) return;
    if (s.fontMode)              { state.fontMode = s.fontMode;         updateFontPickerUI(); }
    if (s.fontSize)              { state.fontSize = s.fontSize;         const el = document.getElementById('font-size-display'); if(el) el.textContent = s.fontSize + '%'; }
    if (s.lineHeight)            { state.lineHeight = s.lineHeight;     const el = document.getElementById('lineh-select'); if(el) el.value = String(s.lineHeight); }
    if (s.theme !== undefined)   { state.theme = s.theme;               document.body.className = s.theme ? 'theme-' + s.theme : ''; if(typeof updateThemeBtnUI === 'function') updateThemeBtnUI(); }
    if (s.margin)                { state.margin = s.margin;             const el = document.getElementById('margin-select'); if(el) el.value = s.margin; applyMargin(s.margin); }
    if (s.writingMode)           { state.writingMode = s.writingMode;   const el = document.getElementById('writing-mode-select'); if(el) el.value = s.writingMode; }
    if (s.fwdBtnSize)            { state.fwdBtnSize = s.fwdBtnSize;     const el = document.getElementById('fwd-btn-size-select'); if(el) el.value = s.fwdBtnSize; applyFwdBtnSize(s.fwdBtnSize); }
    if (s.driveAutoSave !== undefined) { state.driveAutoSave = !!s.driveAutoSave; updateAutoSaveToggleUI(); }
  } catch(e) { console.warn("Failed to load settings fully:", e); }
}


function toggleSettings() {
  const pop = document.getElementById('settings-popover');
  const overlay = document.getElementById('settings-overlay');
  if(pop.classList.contains('show')) {
    pop.classList.remove('show');
    overlay.classList.remove('show');
    document.getElementById('settings-btn').classList.remove('active');
    closeFontPicker();
  } else {
    pop.classList.add('show');
    overlay.classList.add('show');
    document.getElementById('settings-btn').classList.add('active');
    updateThemeBtnUI();
  }
}

function updateThemeBtnUI() {
  const th = state.theme || '';
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  let btn = document.querySelector('.tb-' + (th || 'std'));
  if (btn) btn.classList.add('active');
}

// Override changeTheme to update buttons
const _origChangeTheme = changeTheme;
changeTheme = function(v) {
  _origChangeTheme(v);
  updateThemeBtnUI();
};

function resumeBook() {
  try {
    const data = JSON.parse(localStorage.getItem('epub_last_book'));
    if (data && data.title) {
      showToast(t('toast.resumeHint', {title: data.title}));
      openFilePicker();
    }
  } catch(e) {}
}

function toggleSidebar() {
  state.sidebarOpen = !state.sidebarOpen;
  document.getElementById('sidebar').classList.toggle('hidden', !state.sidebarOpen);
  document.getElementById('toc-btn').classList.toggle('active', state.sidebarOpen);
  if (state.sidebarOpen && _sidebarTab === 'search') {
    setTimeout(() => document.getElementById('search-input').focus(), 50);
  }
}
// ══════════════════════════════════════════
//  Sidebar tab
// ══════════════════════════════════════════
function switchSidebarTab(tab) {
  _sidebarTab = tab;
  document.getElementById('toc-panel').style.display    = tab === 'toc'    ? '' : 'none';
  document.getElementById('search-panel').style.display = tab === 'search' ? '' : 'none';
  document.getElementById('tab-toc').classList.toggle('active',    tab === 'toc');
  document.getElementById('tab-search').classList.toggle('active', tab === 'search');
  if (tab === 'search') {
    const inp = document.getElementById('search-input');
