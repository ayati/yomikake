    setTimeout(() => inp.focus(), 50);
  }
}
// ══════════════════════════════════════════
//  Full-text Search
// ══════════════════════════════════════════
function htmlToText(html) {
  return html
    .replace(/<script[\s\S]*?<\/script>/gi, ' ')
    .replace(/<style[\s\S]*?<\/style>/gi, ' ')
    .replace(/<[^>]+>/g, ' ')
    .replace(/&amp;/g,  '&')
    .replace(/&lt;/g,   '<')
    .replace(/&gt;/g,   '>')
    .replace(/&nbsp;/g, ' ')
    .replace(/&#x([0-9a-fA-F]+);/g, (_, h) => { try { return String.fromCodePoint(parseInt(h, 16)); } catch { return ''; } })
    .replace(/&#([0-9]+);/g,        (_, d) => { try { return String.fromCodePoint(parseInt(d, 10)); } catch { return ''; } })
    .replace(/\s+/g, ' ')
    .trim();
}

function findMatchSnippets(text, query) {
  const lower = text.toLowerCase();
  const qLower = query.toLowerCase();
  const snippets = [];
  let pos = 0;
  while (snippets.length < 3) {
    const idx = lower.indexOf(qLower, pos);
    if (idx === -1) break;
    const start = Math.max(0, idx - 40);
    const end   = Math.min(text.length, idx + query.length + 40);
    snippets.push({
      before: (start > 0 ? '…' : '') + text.slice(start, idx),
      match:  text.slice(idx, idx + query.length),
      after:  text.slice(idx + query.length, end) + (end < text.length ? '…' : ''),
    });
    pos = idx + query.length;
  }
  // 残りのマッチ数を数える
  let extra = 0;
  while (true) {
    const idx = lower.indexOf(qLower, pos);
    if (idx === -1) break;
    extra++;
    pos = idx + query.length;
  }
  return { snippets, extra };
}

function chapterLabelForSpine(spineIdx) {
  // TOCからこの spine に対応するエントリを探す
  const item = state.spine[spineIdx];
  if (!item) return t('sidebar.chapter', { n: spineIdx + 1 });
  const baseHref = (state.opfDir + item.href).split('#')[0];
  const found = state.toc.find(e => {
    const h = e.href.includes('#') ? e.href.split('#')[0] : e.href;
    const abs = (state.opfDir + h).split('#')[0];
    return abs === baseHref;
  });
  return found ? found.label : t('sidebar.chapter', { n: spineIdx + 1 });
}

function appendSearchResult(spineIdx, snippets, extra) {
  const container = document.getElementById('search-results');
  const label = chapterLabelForSpine(spineIdx);
  const total = snippets.length + extra;

  const div = document.createElement('div');
  div.className = 'sr-item';
  div.onclick = () => navigateFromSearch(spineIdx);

  const ch = document.createElement('div');
  ch.className = 'sr-chapter';
  const title = document.createElement('span');
  title.className = 'sr-chapter-title';
  title.textContent = label;
  const badge = document.createElement('span');
  badge.className = 'sr-badge';
  badge.textContent = total;
  ch.appendChild(title);
  ch.appendChild(badge);
  div.appendChild(ch);

  if (snippets.length > 0) {
    const snip = document.createElement('div');
    snip.className = 'sr-snippet';
    snip.innerHTML = esc(snippets[0].before) +
      '<mark>' + esc(snippets[0].match) + '</mark>' +
      esc(snippets[0].after);
    div.appendChild(snip);
  }
  if (extra > 0) {
    const more = document.createElement('div');
    more.className = 'sr-more';
    more.textContent = t('search.more', { n: extra + snippets.length - 1 });
    div.appendChild(more);
  }
  container.appendChild(div);
}

function navigateFromSearch(spineIdx) {
  pushJumpHistory();
  renderPage(spineIdx, 'start');
}

function updateSearchProgress(current, total) {
  document.getElementById('search-progress-fill').style.width =
    (current / total * 100) + '%';
  document.getElementById('search-status').innerHTML =
    '<span>' + t('search.progress', { n: current, total }) + '</span>' +
    '<button id="search-cancel-btn" onclick="_searchSeq++">' +
    t('search.cancel') + '</button>';
}

async function runSearch(query, seq) {
  const total = state.spine.length;
  let hitCount = 0;

  for (let i = 0; i < total; i++) {
    if (seq !== _searchSeq) return;   // 新しい検索が始まったら即中断
    if (i % 5 === 0) await new Promise(r => setTimeout(r, 0));
    updateSearchProgress(i + 1, total);

    const item = state.spine[i];
    const absPath = state.opfDir + item.href.split('#')[0];
    const file = state.epub.file(absPath);
    if (!file) continue;

    let html;
    try { html = await file.async('string'); } catch(e) { continue; }

    const text = htmlToText(html);
    const { snippets, extra } = findMatchSnippets(text, query);
    if (snippets.length > 0) {
      appendSearchResult(i, snippets, extra);
      hitCount++;
    }
  }

  if (seq !== _searchSeq) return;   // 完了時も自分が最新かを確認
  _searching = false;
  document.getElementById('search-progress-fill').style.width = '100%';
  const statusText = hitCount > 0
    ? t('search.done', { count: hitCount, total })
    : t('search.none');
  document.getElementById('search-status').textContent = statusText;
  setTimeout(() => {
    if (seq !== _searchSeq) return;

function loadPreviewFonts() {
  const families = Object.keys(FONT_URLS).map(k => {
    // Literata/Lora/EB Garamond/Merriweather は斜体バリアントも含める
    if (k === 'literata')    return 'Literata:ital,opsz@0,7..72;1,7..72';
    if (k === 'lora')        return 'Lora:ital@0;1';
    if (k === 'eb-garamond') return 'EB+Garamond:ital@0;1';
    if (k === 'merriweather') return 'Merriweather:ital,wght@0,400;1,400';
    // その他はファミリー名をエンコード
    return FONTS[k].split(',')[0].replace(/"/g,'').trim().replace(/ /g,'+');
  });
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?' +
    families.map(f => 'family=' + f).join('&') + '&display=swap';
  document.head.appendChild(link);
}

function buildFontPickerList() {
  const list = document.getElementById('font-picker-list');
  if (!list) return;
  const sample = FONT_SAMPLE[_lang] || FONT_SAMPLE['ja'];
  let html = '';

  for (const group of FONT_GROUPS) {
    if (group.key) {
      // 単独行（publisher）
      const label = group.i18n ? t(group.label) : group.label;
      const sel   = state.fontMode === group.key ? ' fp-selected' : '';
      html += '<div class="fp-item' + sel + '" onclick="selectFont(\'' + group.key + '\')">' +
        '<span class="fp-name">' + esc(label) + '</span>' +
        '</div>';
    } else {
      // グループ
      const glabel = group.groupLabel[_lang] || group.groupLabel['ja'];
      html += '<div class="fp-group-header">' + esc(glabel) + '</div>';
      for (const item of group.items) {
        const label   = item.i18n ? t(item.label) : item.label;
        const ff      = FONTS[item.key];
        const style   = ff ? " style='font-family:" + ff + "'" : '';
        const sel     = state.fontMode === item.key ? ' fp-selected' : '';
        const isWeb   = !!FONT_URLS[item.key];
        const nameStr = esc(label) + (isWeb ? ' <span style="font-size:10px;opacity:.5">☁</span>' : '');
        html += '<div class="fp-item' + sel + '" onclick="selectFont(\'' + item.key + '\')">' +
          '<span class="fp-name">' + nameStr + '</span>' +
          '<span class="fp-sample"' + style + '>' + esc(sample) + '</span>' +
          '</div>';
      }
    }
  }

  list.innerHTML = html;
}

function updateFontPickerUI() {

// ══════════════════════════════════════════
//  File System Handle — IndexedDB helpers
//  Chrome/Edge の File System Access API でハンドルを永続化する。
//  非対応ブラウザでは関数が呼ばれないため副作用なし。
// ══════════════════════════════════════════
const FSH_DB_NAME = 'epub_viewer_fsh';
let _fshDB = null;
function _openFshDB() {
  if (_fshDB) return Promise.resolve(_fshDB);
  return new Promise((res, rej) => {
    const req = indexedDB.open(FSH_DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
    req.onsuccess = e => { _fshDB = e.target.result; res(_fshDB); };
    req.onerror = () => rej(req.error);
  });
}
async function fshGet(key) {
  const db = await _openFshDB();
  return new Promise((res, rej) => {
    const req = db.transaction('handles', 'readonly').objectStore('handles').get(key);
    req.onsuccess = () => res(req.result || null);
    req.onerror = () => rej(req.error);
  });
}
async function fshPut(key, handle) {
  const db = await _openFshDB();
  return new Promise((res, rej) => {
    const req = db.transaction('handles', 'readwrite').objectStore('handles').put(handle, key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}
async function fshDelete(key) {
  const db = await _openFshDB();
  return new Promise((res, rej) => {
    const req = db.transaction('handles', 'readwrite').objectStore('handles').delete(key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}
async function fshGetAllKeys() {
  const db = await _openFshDB();
  return new Promise((res, rej) => {
    const req = db.transaction('handles', 'readonly').objectStore('handles').getAllKeys();
    req.onsuccess = () => res(req.result || []);
    req.onerror = () => rej(req.error);
  });
}
// ページ起動時にハンドルキー一覧をロードしてリストのボタン表示に使う
if (window.showOpenFilePicker) {

function formatRelativeDate(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  if (isNaN(d)) return '—';
  const now = new Date();
  const diffMs = now - d;
  const diffDays = Math.floor(diffMs / 86400000);
  if (diffDays === 0) return t('readingList.today');
  if (diffDays === 1) return t('readingList.yesterday');
  if (diffDays < 30) return t('readingList.daysAgo', {n: diffDays});
  const m = d.getMonth() + 1, day = d.getDate();
  return m + '/' + day;
}

function buildReadingList() {
  const items = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith('epub_pos_')) continue;
    try {
      const val = JSON.parse(localStorage.getItem(key));
      if (!val) continue;
      const withoutPrefix = key.slice('epub_pos_'.length);
      const lastUnder = withoutPrefix.lastIndexOf('_');
      if (lastUnder === -1) continue;
      const title = withoutPrefix.slice(0, lastUnder);
      const spineCount = parseInt(withoutPrefix.slice(lastUnder + 1), 10);
      if (!title || isNaN(spineCount) || spineCount <= 0) continue;
      // 完読済み除外: 最終章かつ ratio > 0.9
      if (val.spineIdx >= spineCount - 1 && (val.ratio || 0) > 0.9) continue;
      items.push({key, title, spineCount,
        spineIdx: val.spineIdx || 0, ratio: val.ratio || 0,
        lastOpenedAt: val.lastOpenedAt || null,
        creator: val.creator || '',
        cover: val.cover || '',
      });
    } catch(e) {}
  }
  items.sort((a, b) => {
    if (!a.lastOpenedAt && !b.lastOpenedAt) return 0;
    if (!a.lastOpenedAt) return 1;
    if (!b.lastOpenedAt) return -1;
    return new Date(b.lastOpenedAt) - new Date(a.lastOpenedAt);
  });

  let lastReadKey = '';
  try {
    const lb = JSON.parse(localStorage.getItem('epub_last_book'));
    if (lb && lb.bookKey) lastReadKey = lb.bookKey;
  } catch(e) {}

  const listEl = document.getElementById('reading-list');
  const dropEl = document.getElementById('drop-zone');
  const welcomeEl = document.getElementById('welcome');
  if (!items.length) {
    _editMode = false;
    listEl.style.display = 'none';
    listEl.classList.remove('edit-mode');
    dropEl.style.display = '';
    welcomeEl.classList.remove('has-list');
    return;
  }
  listEl.style.display = 'flex';
  listEl.classList.toggle('edit-mode', _editMode);
  dropEl.style.display = 'none';
  welcomeEl.classList.add('has-list');
  document.getElementById('reading-list-count').textContent = t('readingList.count', {n: items.length});
  const editBtn = document.getElementById('reading-list-edit-btn');
  if (editBtn) editBtn.textContent = _editMode ? t('readingList.editDone') : t('readingList.edit');
  const doneBtn = document.getElementById('reading-list-done-btn');
  if (doneBtn) doneBtn.textContent = t('readingList.editDone');

  const BOOK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>';
  document.getElementById('reading-list-items').innerHTML = items.map(item => {
    const isLast = item.key === lastReadKey;
    const pct = Math.min(100, ((item.spineIdx + item.ratio) / item.spineCount * 100)).toFixed(0);
    const thumbHtml = item.cover
      ? `<img src="${esc(item.cover)}" width="48" height="68" alt="" loading="lazy">`
      : BOOK_ICON;
    const creatorHtml = item.creator
      ? `<div class="rl-creator">${esc(item.creator)}</div>` : '';
    return `<div class="rl-card${isLast ? ' rl-last' : ''}" data-key="${esc(item.key)}">
  <button class="rl-delete-btn" onclick="confirmDeleteBook('${esc(item.key)}','${esc(item.title)}')" aria-label="${t('readingList.deleteTitle')}">×</button>
  <div class="rl-thumb">${thumbHtml}</div>
  <div class="rl-info">
    <div class="rl-title">${esc(item.title)}</div>
    ${creatorHtml}
    <div class="rl-progress-row">
      <div class="rl-bar"><div class="rl-fill" style="width:${pct}%"></div></div>
      <span class="rl-chapter">${t('readingList.chapter', {n: item.spineIdx + 1, total: item.spineCount})}</span>
      <span class="rl-pct">${pct}%</span>
    </div>
    <div class="rl-meta">
      <span class="rl-date">${formatRelativeDate(item.lastOpenedAt)}</span>
      <button class="rl-open-btn${_handleKeys.has(item.key) ? ' rl-open-direct' : ''}" data-key="${esc(item.key)}" onclick="openFilePickerForBook(this.dataset.key)">${_handleKeys.has(item.key) ? t('readingList.openDirect') : t('readingList.openThis')}</button>
    </div>
  </div>
</div>`;
  }).join('');
}

// ── extractCoverThumb: OPFから表紙画像を抽出して48×68pxのJPEGサムネイルを返す ──
async function extractCoverThumb(opfDoc) {
  // ePub3: <item properties="cover-image">
  let coverItem = [...opfDoc.querySelectorAll('manifest item')]
    .find(i => (i.getAttribute('properties') || '').includes('cover-image'));
  // ePub2: <meta name="cover" content="item-id">
  if (!coverItem) {
    const coverMeta = opfDoc.querySelector('metadata > meta[name="cover"]');
    if (coverMeta) {
      const coverId = coverMeta.getAttribute('content');
      if (coverId) coverItem = opfDoc.querySelector(`manifest item[id="${CSS.escape(coverId)}"]`);
    }
  }
  // フォールバック: id="cover" または id="cover-image"
  if (!coverItem) {
    coverItem = opfDoc.querySelector('manifest item[id="cover"]') ||
                opfDoc.querySelector('manifest item[id="cover-image"]');
  }
  if (!coverItem) return null;
  const href = coverItem.getAttribute('href');
  if (!href) return null;
  const absPath = state.opfDir + href;
  const f = state.epub.file(absPath);
  if (!f) return null;
  const b64 = await f.async('base64');
  const ext = absPath.split('.').pop().toLowerCase();
  const mime = ext === 'png' ? 'image/png' : ext === 'gif' ? 'image/gif' : ext === 'webp' ? 'image/webp' : 'image/jpeg';
  const dataUri = `data:${mime};base64,${b64}`;
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      try {
        const TW = 48, TH = 68;
        const ir = img.width / img.height, tr = TW / TH;
        let sw, sh, sx, sy;
        if (ir > tr) { sh = img.height; sw = sh * tr; sx = (img.width - sw) / 2; sy = 0; }
        else         { sw = img.width; sh = sw / tr; sx = 0; sy = (img.height - sh) / 2; }
        const canvas = document.createElement('canvas');
        canvas.width = TW; canvas.height = TH;
        canvas.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, TW, TH);
        resolve(canvas.toDataURL('image/jpeg', 0.65));
      } catch(e) { resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = dataUri;
  });
}

  const spineItem = state.spine[spineIdx];
  let label = null;
  if (spineItem) {
    const tocEntry = state.toc.find(item => {
      const base = item.href.split('#')[0];
      return spineItem.href === base ||
             spineItem.absPath === state.opfDir + base ||
             spineItem.absPath.endsWith('/' + base);
    });
    if (tocEntry) label = tocEntry.label;
  }
  if (!label) label = t('sidebar.chapter', {n: spineIdx + 1});
  const pct = Math.round((ratio || 0) * 100);
  return esc(label) + '<span class="history-pct"> · ' + pct + '%</span>';
}
function pushJumpHistory() {
  if (!state.epub) return;
  const entry = {spineIdx: state.currentSpineIdx, ratio: _intraChapterRatio};
  if (_jumpHistory.some(h => h.spineIdx === entry.spineIdx && Math.abs(h.ratio - entry.ratio) < 0.01)) return;
  _jumpHistory.unshift(entry);
  if (_jumpHistory.length > 4) _jumpHistory.pop();
  updateJumpHistoryUI();
}
function updateJumpHistoryUI() {
  const section = document.getElementById('jump-history-section');
  if (!section) return;
  const hasOriginal = _originalBookmark !== null;
  const hasHistory  = _jumpHistory.length > 0;
  if (!hasOriginal && !hasHistory) { section.style.display = 'none'; return; }
  section.innerHTML = '';
  if (hasOriginal) {
    const el = document.createElement('div');
    el.className = 'history-item';
    el.innerHTML = '<span class="history-icon">📌</span><span class="history-label">' + labelForPos(_originalBookmark.spineIdx, _originalBookmark.ratio) + '</span>';
    el.onclick = () => { pushJumpHistory(); renderPage(_originalBookmark.spineIdx, _originalBookmark.ratio); };
    section.appendChild(el);
  }
  _jumpHistory.forEach(entry => {
    const el = document.createElement('div');
    el.className = 'history-item';
    el.innerHTML = '<span class="history-icon">↩</span><span class="history-label">' + labelForPos(entry.spineIdx, entry.ratio) + '</span>';
    el.onclick = () => { pushJumpHistory(); renderPage(entry.spineIdx, entry.ratio); };
    section.appendChild(el);
  });
  const divider = document.createElement('hr');
  divider.className = 'history-divider';
  section.appendChild(divider);
  section.style.display = '';
}
// ══════════════════════════════════════════
//  Bookmark Export / Import
// ══════════════════════════════════════════
function exportBookmarks() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('epub_pos_') || key === 'epub_last_book') {
      try { data[key] = JSON.parse(localStorage.getItem(key)); } catch(e) { data[key] = localStorage.getItem(key); }
    }
  }
  const count = Object.keys(data).filter(k => k.startsWith('epub_pos_')).length;
  if (count === 0) { showToast(t('toast.noBookmarks')); return; }
  const blob = new Blob(
    [JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), bookmarks: data }, null, 2)],
    { type: 'application/json' }
  );
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
  a.href = url;
  a.download = 'epub_bookmarks_' + date + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast(t('toast.exported', {count}));
}

document.getElementById('bookmark-input').addEventListener('change', e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const json = JSON.parse(ev.target.result);
      if (!json.bookmarks || typeof json.bookmarks !== 'object') throw new Error(t('err.invalidFormat'));
      let count = 0;
      for (const [key, val] of Object.entries(json.bookmarks)) {
        if (!key.startsWith('epub_pos_') && key !== 'epub_last_book') continue;
        try {
          localStorage.setItem(key, typeof val === 'string' ? val : JSON.stringify(val));
          if (key.startsWith('epub_pos_')) count++;
        } catch(e) { notifyStorageError(); break; }
      }
      let jumped = false;
      if (state.epub && state.bookKey) {
        const newVal = json.bookmarks[state.bookKey];
        if (newVal != null) {
          let newSaved;
          try { newSaved = typeof newVal === 'string' ? JSON.parse(newVal) : newVal; } catch(e) {}
          if (newSaved && typeof newSaved.spineIdx === 'number') {
            const newIdx   = newSaved.spineIdx;
            const newRatio = typeof newSaved.ratio === 'number' ? newSaved.ratio : 0;
            const curIdx   = state.currentSpineIdx;
            const isAhead  = newIdx > curIdx ||
                             (newIdx === curIdx && newRatio > _intraChapterRatio + 0.01);
            const isNotFinal = newIdx < state.spine.length - 1;
            if (isAhead && isNotFinal) {
              pushJumpHistory();
              renderPage(newIdx, newRatio);
              showToast(t('toast.localJumped', {n: newIdx + 1}));
              jumped = true;
            }
          }
        }
      }
      if (!jumped) showToast(t('toast.imported', {count}));
      showResumeBanner();
      updateThemeBtnUI();

    } catch(err) {
      alert(t('err.importFailed', {msg: err.message}));
    }
  };
  reader.readAsText(file);
});

// ══════════════════════════════════════════
//  Google Drive しおり同期
// ══════════════════════════════════════════

// OAuth アクセストークンを取得（キャッシュがあれば再利用、同時呼び出しは同一 Promise を共有）
function driveAuth() {
  // 有効期限5分以上残っていればキャッシュ済みトークンをそのまま使用
  if (_driveToken && Date.now() < _driveTokenExpiry - 300000) return Promise.resolve(_driveToken);
  // 既に認証フロー進行中なら同じ Promise を返す（_tokenClient.callback 競合を防止）
  if (_authPromise) return _authPromise;
  if (!GOOGLE_CLIENT_ID) { showToast(t('toast.driveNoClientId')); return Promise.reject(new Error('no_client_id')); }
  if (typeof google === 'undefined' || !google.accounts) {
    return Promise.reject(new Error('Google Identity Services が読み込まれていません。HTTP サーバー経由で開いてください。'));
  }
  _authPromise = new Promise((resolve, reject) => {
    const onToken = r => {
      _authPromise = null;
      if (r.error) { _driveToken = null; reject(new Error(r.error)); return; }
      _driveToken = r.access_token;
      _driveTokenExpiry = Date.now() + (r.expires_in || 3600) * 1000;
      scheduleTokenRefresh();
      resolve(_driveToken);
    };
    if (!_tokenClient) {
      // 初回: ポップアップで認証
      _tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive.appdata',
        callback: onToken,
      });
      _tokenClient.requestAccessToken();
    } else {
      // 2回目以降: prompt:'' でユーザー操作なしにサイレントリフレッシュ
      _tokenClient.callback = onToken;
      _tokenClient.requestAccessToken({ prompt: '' });
    }
  });
  return _authPromise;
}

// トークン有効期限の5分前にサイレントリフレッシュをスケジュール
function scheduleTokenRefresh() {
  clearTimeout(_refreshTimer);
  if (!_tokenClient) return;
  const delay = _driveTokenExpiry - Date.now() - 300000;
  if (delay <= 0) return;
  _refreshTimer = setTimeout(async () => {
    _driveToken = null;  // 期限切れとみなしてリフレッシュを強制
    try { await driveAuth(); } catch(e) { /* サイレント失敗: 次回操作時に再取得 */ }
  }, delay);
}

// appDataFolder 内の epub_bookmarks.json を検索して fileId を返す（なければ null）
async function driveFindFile(token) {
  if (state.driveFileId) return state.driveFileId;
  const res = await fetch(
    'https://www.googleapis.com/drive/v3/files' +
    '?spaces=appDataFolder&q=' + encodeURIComponent("name='epub_bookmarks.json'") + '&fields=files(id)',
    { headers: { Authorization: 'Bearer ' + token } }
  );
  if (res.status === 401) { _driveToken = null; state.driveFileId = null; throw new Error('401 Unauthorized — 再度ボタンをクリックしてください'); }
  if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
  const json = await res.json();
  const id = (json.files && json.files[0]) ? json.files[0].id : null;
  if (id && !/^[a-zA-Z0-9_-]{10,200}$/.test(id)) throw new Error('Unexpected file ID format');
  state.driveFileId = id;
  return state.driveFileId;
}

// ローカルのしおりデータを収集して { version, exportedAt, bookmarks } を返す
function collectBookmarks() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('epub_pos_') || key === 'epub_last_book') {
      try { data[key] = JSON.parse(localStorage.getItem(key)); } catch(e) { data[key] = localStorage.getItem(key); }
    }
  }
  return { version: 1, exportedAt: new Date().toISOString(), bookmarks: data };
}

// しおりを Drive に保存（Driveにしおりを保存ボタン）
// 手動・自動保存共通のアップロードコア（UIに触れない、エラーはそのまま throw）
async function driveUploadCore(token) {
  const payload = collectBookmarks();
  const count = Object.keys(payload.bookmarks).filter(k => k.startsWith('epub_pos_')).length;
  const body = JSON.stringify(payload, null, 2);
  const fileId = await driveFindFile(token);

  if (fileId) {
    // 既存ファイルを上書き更新
    const res = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files/' + fileId + '?uploadType=media',
      { method: 'PATCH', headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' }, body }
    );
    if (res.status === 401) { _driveToken = null; state.driveFileId = null; throw new Error('401 Unauthorized — 再度ボタンをクリックしてください'); }
    if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
  } else {
    // 新規作成（multipart: メタデータ＋本文を一度に送信）
    const boundary = 'epub_bm_boundary';
    const meta = JSON.stringify({ name: 'epub_bookmarks.json', parents: ['appDataFolder'] });
    const multipart =
      '--' + boundary + '\r\n' +
      'Content-Type: application/json; charset=UTF-8\r\n\r\n' + meta + '\r\n' +
      '--' + boundary + '\r\n' +
      'Content-Type: application/json\r\n\r\n' + body + '\r\n' +
      '--' + boundary + '--';
    const res = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
      { method: 'POST', headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'multipart/related; boundary=' + boundary }, body: multipart }
    );
    if (res.status === 401) { _driveToken = null; state.driveFileId = null; throw new Error('401 Unauthorized — 再度ボタンをクリックしてください'); }
    if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
    const created = await res.json();
    state.driveFileId = created.id;
  }
  return count;
}

async function driveUpload() {
  if (!GOOGLE_CLIENT_ID) { showToast(t('toast.driveNoClientId')); return; }
  const btn = document.getElementById('drive-upload-btn');
  btn.disabled = true;
  try {
    const token = await driveAuth();
    const count = await driveUploadCore(token);
    showToast(t('toast.driveUploaded', {count}));
  } catch(err) {
    if (err.message !== 'no_client_id') alert(t('err.driveFailed', {msg: err.message}));
  } finally {
    btn.disabled = false;
  }
}

// ──────────────────────────────────────────
//  Drive 自動保存
// ──────────────────────────────────────────
function scheduleAutoSave() {
  if (!state.driveAutoSave || !GOOGLE_CLIENT_ID) return;
  if (_autoSaveBusy) return;
  clearTimeout(_autoSaveTimer);
  const elapsed = Date.now() - _lastAutoSaveAt;
  const delay = Math.max(0, AUTO_SAVE_INTERVAL - elapsed);
  _autoSaveTimer = setTimeout(runAutoSave, delay);
}

async function runAutoSave() {
  if (!state.driveAutoSave || _autoSaveBusy) return;
  _autoSaveBusy = true;
  try {
    const token = await driveAuth();
    await driveUploadCore(token);
    _lastAutoSaveAt = Date.now();
  } catch(e) {
    if (e.message && e.message.startsWith('401')) {
      // 万一トークンが失効していた場合: サイレントリフレッシュを試みてリトライ
      _driveToken = null;
      try {
        const token2 = await driveAuth();
        await driveUploadCore(token2);
        _lastAutoSaveAt = Date.now();
      } catch(e2) {
        // Googleセッション切れなど回復不能 → 自動保存を停止してユーザーに通知
        state.driveAutoSave = false;
        saveSettings();
        updateAutoSaveToggleUI();
        showToast(t('toast.driveAutoSaveExpired'));
      }
    }
    // その他のエラー（ネットワーク断など）は silent
  } finally {
    _autoSaveBusy = false;
  }
}

async function toggleDriveAutoSave() {
  if (state.driveAutoSave) {
    // OFF にする
    state.driveAutoSave = false;
    clearTimeout(_autoSaveTimer);
    clearTimeout(_refreshTimer);
    saveSettings();
    updateAutoSaveToggleUI();
    return;
  }
  // ON にする: Drive接続を確認してから有効化
  const btn = document.getElementById('drive-auto-toggle');
  btn.disabled = true;
  try {
    const token = await driveAuth();
    await driveFindFile(token);  // fileIDキャッシュのウォームアップ兼接続確認
    state.driveAutoSave = true;
    saveSettings();
    showToast(t('toast.driveAutoSaveOn'));
  } catch(e) {
    if (e.message !== 'no_client_id') showToast(t('err.driveFailed', {msg: e.message}));
  } finally {
    btn.disabled = false;
    updateAutoSaveToggleUI();
  }
}

function updateAutoSaveToggleUI() {
  const btn = document.getElementById('drive-auto-toggle');
  if (!btn) return;
  const on = state.driveAutoSave;
  btn.textContent = on ? 'ON' : 'OFF';
  btn.style.background = on ? 'var(--accent)' : '';
  btn.style.color = on ? '#fff' : '';
  const upBtn = document.getElementById('drive-upload-btn');
  if (upBtn) {
    upBtn.classList.toggle('auto-save-on', on);
    const path = upBtn.querySelector('path');
    if (path) path.setAttribute('stroke-dasharray', on ? '' : '3 2');
  }
}

// Drive からしおりを読み込んで localStorage に反映（Driveからしおりを読み込むボタン）
async function driveDownload() {
  if (!GOOGLE_CLIENT_ID) { showToast(t('toast.driveNoClientId')); return; }
  const btn = document.getElementById('drive-download-btn');
  btn.disabled = true;
  try {
    const token = await driveAuth();
    const fileId = await driveFindFile(token);
    if (!fileId) { showToast(t('toast.driveNoFile')); return; }

    const res = await fetch(
      'https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media',
      { headers: { Authorization: 'Bearer ' + token } }
    );
    if (res.status === 401) { _driveToken = null; state.driveFileId = null; throw new Error('401 Unauthorized — 再度ボタンをクリックしてください'); }
    if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
    const json = await res.json();
    if (!json.bookmarks || typeof json.bookmarks !== 'object') throw new Error(t('err.invalidFormat'));

    // ボタンを一時再有効化してから confirm を表示（disabled のままダイアログを出すと UX が悪い）
    btn.disabled = false;
    const hasLocal = Array.from({ length: localStorage.length }, (_, i) => localStorage.key(i))
      .some(k => k.startsWith('epub_pos_'));
    if (hasLocal && !confirm(t('confirm.driveOverwrite'))) return;
    btn.disabled = true;

    let count = 0;
    for (const [key, val] of Object.entries(json.bookmarks)) {
      if (!key.startsWith('epub_pos_') && key !== 'epub_last_book') continue;
      try {
        localStorage.setItem(key, typeof val === 'string' ? val : JSON.stringify(val));
        if (key.startsWith('epub_pos_')) count++;
      } catch(e) { notifyStorageError(); break; }
    }
    let jumped = false;
    if (state.epub && state.bookKey) {
      const newVal = json.bookmarks[state.bookKey];
      if (newVal != null) {
        let newSaved;
        try { newSaved = typeof newVal === 'string' ? JSON.parse(newVal) : newVal; } catch(e) {}
        if (newSaved && typeof newSaved.spineIdx === 'number') {
          const newIdx   = newSaved.spineIdx;
          const newRatio = typeof newSaved.ratio === 'number' ? newSaved.ratio : 0;
          const curIdx   = state.currentSpineIdx;
          const isAhead  = newIdx > curIdx ||
                           (newIdx === curIdx && newRatio > _intraChapterRatio + 0.01);
          const isNotFinal = newIdx < state.spine.length - 1;
          if (isAhead && isNotFinal) {
            pushJumpHistory();
            renderPage(newIdx, newRatio);
            showToast(t('toast.driveJumped', {n: newIdx + 1}));
            jumped = true;
          }
        }
      }
    }
    if (!jumped) showToast(t('toast.driveDownloaded', {count}));
    showResumeBanner();
  } catch(err) {
    if (err.message !== 'no_client_id') alert(t('err.driveFailed', {msg: err.message}));
  } finally {
    btn.disabled = false;
  }
}

function notifyStorageError() {
  if (window._storageWarnShown) return;
  window._storageWarnShown = true;
  showToast(t('toast.storageError'));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════
//  Help / Modal
// ══════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function updateHelpContent() {
  document.getElementById('modal-title').textContent = t('modal.title.help');
  const bookInfo = state.epub ? [
    '<div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:12px 16px;margin-bottom:16px;">',
    '<p style="font-size:11px;opacity:.55;margin-bottom:6px;">' + esc(t('help.currentBook')) + '</p>',
    '<p style="font-size:14px;font-weight:bold;line-height:1.6;opacity:1;margin-bottom:4px;">' + esc(state.bookTitle) + '</p>',
    state.bookCreator ? '<p>' + esc(t('help.author', {creator: state.bookCreator})) + '</p>' : '',
    '<p>' + esc(t('help.chapters', {n: state.spine.length})) + '</p>',
    state.toc.length ? '<p>' + esc(t('help.tocItems', {n: state.toc.length})) + '</p>' : '',
    '</div>',
  ].join('') : '';
  document.getElementById('modal-body').innerHTML = bookInfo + t('help.body');
}
function showHelp() {
  updateHelpContent();
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(skipFlash = false) {
  document.getElementById('modal-overlay').classList.remove('show');
  document.getElementById('modal-close').style.display = '';
  if (!skipFlash) flashNavButtons();
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ══════════════════════════════════════════
//  Fullscreen
// ══════════════════════════════════════════
let _fsExitTimer = null;

function toggleFullscreen() {
  if (state.sidebarOpen) toggleSidebar();
  const pop = document.getElementById('settings-popover');
  if (pop.classList.contains('show')) toggleSettings();

  state.fullscreen = !state.fullscreen;
  document.body.classList.toggle('fullscreen', state.fullscreen);

  if (state.fullscreen) {
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(() => {});
    }
    history.pushState({ epub_fs: true }, '');
  } else {
    if (document.fullscreenElement) document.exitFullscreen();
    _clearFsExitBtn();
  }
}

function showFsExitBtn() {
  if (!state.fullscreen) return;
  const btn = document.getElementById('fs-exit-btn');
  btn.classList.add('show');
  if (_fsExitTimer) clearTimeout(_fsExitTimer);
  _fsExitTimer = setTimeout(() => { btn.classList.remove('show'); _fsExitTimer = null; }, 2000);
}

function _clearFsExitBtn() {
  const btn = document.getElementById('fs-exit-btn');
  if (btn) btn.classList.remove('show');
  if (_fsExitTimer) { clearTimeout(_fsExitTimer); _fsExitTimer = null; }
}

// Layer2（ブラウザフルスクリーン）の外部解除をLayer1に同期
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && state.fullscreen) {
    state.fullscreen = false;
    document.body.classList.remove('fullscreen');
    _clearFsExitBtn();
  }
});

// Android バックボタン対応
window.addEventListener('popstate', () => {
  if (state.fullscreen) toggleFullscreen();
});

// Toolbar horizontal scroll via mouse wheel
document.getElementById('toolbar').addEventListener('wheel', e => {
  if (e.deltaY === 0) return;
  e.preventDefault();
  e.currentTarget.scrollLeft += e.deltaY;
}, { passive: false });

// Init
initLang();
applyI18n();
document.getElementById('toc-btn').classList.add('active');
loadSettings();
showResumeBanner();
updateThemeBtnUI();
loadPreviewFonts();

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); startSearch(); }
});
// 書籍未読み込み時は検索ボタンと入力を無効化
document.getElementById('search-input').disabled = true;
document.getElementById('search-btn').disabled = true;

// file:// で開いた場合は Drive ボタンと自動保存グループを非表示（Google OAuth は file:// 非対応）
if (location.protocol !== 'http:' && location.protocol !== 'https:') {
  document.getElementById('drive-download-btn').style.display = 'none';
  document.getElementById('drive-upload-btn').style.display = 'none';
  document.getElementById('drive-auto-group').style.display = 'none';
  state.driveAutoSave = false;  // file:// 環境では強制 OFF
}
