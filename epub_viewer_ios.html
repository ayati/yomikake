<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>縦書きePub3ビューア（iOS Safari専用）</title>
<style>
  :root {
    --bg:#f8f6f2; --paper:#ffffff; --text:#201a15;
    --accent:#b55632; --ui-bg:#ffffff; --ui-text:#332922;
    --ui-border:#e5dfd5; --shadow:rgba(0,0,0,0.08); --page-shadow:rgba(0,0,0,0.05);
    --hover-bg:rgba(0,0,0,0.04); --backdrop:rgba(255,255,255,0.85); --glass-border:rgba(255,255,255,0.4);
  }
  .theme-dark  { --bg:#141417; --paper:#1c1c20; --text:#e0dcd5; --accent:#dc6e4c; --ui-bg:#1c1c20; --ui-text:#e0dcd5; --ui-border:#33333b; --shadow:rgba(0,0,0,0.7); --page-shadow:rgba(0,0,0,0.5); --hover-bg:rgba(255,255,255,0.08); --backdrop:rgba(28,28,32,0.85); --glass-border:rgba(255,255,255,0.08); }
  .theme-sepia { --bg:#f4ecd8; --paper:#fbf6eb; --text:#4a3825; --accent:#9c6142; --ui-bg:#fbf6eb; --ui-text:#4a3825; --ui-border:#d9cbb0; --shadow:rgba(74,56,37,0.1); --page-shadow:rgba(74,56,37,0.06); --hover-bg:rgba(74,56,37,0.06); --backdrop:rgba(251,246,235,0.85); --glass-border:rgba(255,255,255,0.3); }
  .theme-white { --bg:#ececec; --paper:#ffffff; --text:#181818; --accent:#1e78a0; --ui-bg:#ffffff; --ui-text:#222; --ui-border:#d4d4d4; --shadow:rgba(0,0,0,0.15); --page-shadow:rgba(0,0,0,0.08); --hover-bg:rgba(0,0,0,0.05); --backdrop:rgba(255,255,255,0.9); --glass-border:rgba(255,255,255,0.5); }

  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background:var(--bg); color:var(--text); height:100vh; height:100dvh; overflow:hidden; display:flex; flex-direction:column; user-select:none; padding-bottom:env(safe-area-inset-bottom,0); }

  #toolbar { min-height:40px; background:var(--ui-bg); border-bottom:1px solid var(--ui-border); display:flex; align-items:center; padding:0 8px; gap:4px; flex-shrink:0; box-shadow:0 1px 4px var(--shadow); z-index:100; position:relative; }

  #toolbar button, .icon-btn { background:transparent; border:none; color:var(--ui-text); padding:4px 8px; border-radius:6px; cursor:pointer; font-size:13px; display:flex; align-items:center; gap:4px; transition:all .15s ease; font-weight:500; }
  #toolbar button:hover, .icon-btn:hover { background:var(--hover-bg); }
  #toolbar button svg, .icon-btn svg { width:16px; height:16px; opacity:0.8; }
  #toolbar button.active { background:var(--hover-bg); color:var(--accent); }
  #toolbar button.active svg { opacity:1; stroke:var(--accent); }
  #toolbar .tb-sep { width:1px; height:20px; background:var(--ui-border); margin:0 4px; flex-shrink:0; }

  #book-title { font-size:13px; font-weight:600; opacity:.9; flex:1; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 12px; }
  #open-btn { background:var(--accent)!important; color:#fff!important; padding:4px 12px!important; box-shadow:0 2px 6px rgba(181,86,50,0.3); }
  #open-btn:hover { filter:brightness(1.1); }
  #open-btn svg { stroke:#fff; }

  /* Settings Popover */
  .popover-overlay { position:fixed; inset:0; z-index:400; display:none; }
  .popover-overlay.show { display:block; }
  #settings-popover { position:absolute; top:64px; right:16px; width:340px; background:var(--backdrop); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid var(--glass-border); border-radius:16px; box-shadow:0 12px 32px var(--shadow), 0 2px 8px var(--shadow); z-index:500; opacity:0; visibility:hidden; transform:translateY(-8px); transition:all .2s cubic-bezier(0.16,1,0.3,1); display:flex; flex-direction:column; overflow:hidden; }
  #settings-popover.show { opacity:1; visibility:visible; transform:translateY(0); }
  .pop-header { padding:16px 20px; font-weight:600; font-size:15px; border-bottom:1px solid var(--ui-border); color:var(--ui-text); display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.02); }
  .pop-body { padding:0 12px 12px; max-height:calc(100vh - 100px); overflow-y:auto; }

  .set-group { margin-top:20px; padding-bottom:4px; }
  .set-group h4 { font-size:12px; font-weight:600; color:var(--ui-text); opacity:0.6; text-transform:uppercase; margin:0 8px 12px; letter-spacing:0.5px; }
  .set-row { display:flex; align-items:center; justify-content:space-between; padding:8px; border-radius:8px; }
  .set-row:hover { background:var(--hover-bg); }
  .set-label { font-size:14px; color:var(--ui-text); }

  select.modern-select { appearance:none; background:var(--ui-bg); border:1px solid var(--ui-border); color:var(--ui-text); padding:8px 32px 8px 12px; border-radius:8px; font-size:13px; cursor:pointer; outline:none; font-family:inherit; background-image:url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" fill="none" stroke="%23888" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'); background-repeat:no-repeat; background-position:right 8px center; background-size:14px; min-width:140px; box-shadow:inset 0 1px 2px rgba(0,0,0,0.02); }

  .btn-group { display:flex; background:var(--ui-bg); border:1px solid var(--ui-border); border-radius:8px; overflow:hidden; }
  .btn-group button { background:transparent; border:none; padding:8px 16px; color:var(--ui-text); cursor:pointer; font-size:14px; transition:background .15s; }
  .btn-group button:hover { background:var(--hover-bg); }
  .btn-group span { display:flex; align-items:center; justify-content:center; padding:0 8px; font-size:13px; font-weight:500; border-left:1px solid var(--ui-border); border-right:1px solid var(--ui-border); min-width:54px; color:var(--ui-text); }

  .theme-options { display:flex; gap:8px; }
  .theme-btn { width:32px; height:32px; border-radius:50%; border:2px solid var(--ui-border); cursor:pointer; transition:transform .15s; display:flex; align-items:center; justify-content:center; }
  .theme-btn:hover { transform:scale(1.1); }
  .theme-btn.active { border-color:var(--accent); }
  .theme-btn svg { width:14px; height:14px; stroke:var(--accent); stroke-width:3; opacity:0; }
  .theme-btn.active svg { opacity:1; }

  .tb-std { background:#fff; border-color:#e5dfd5; }
  .tb-sepia { background:#fbf6eb; border-color:#d9cbb0; }
  .tb-dark { background:#1c1c20; border-color:#33333b; }
  .tb-white { background:#ffffff; border-color:#d4d4d4; }

  #main { flex:1; display:flex; overflow:hidden; }

  #sidebar { width:280px; background:var(--ui-bg); border-right:1px solid var(--ui-border); display:flex; flex-direction:column; transition:transform .3s cubic-bezier(0.16,1,0.3,1); overflow:hidden; flex-shrink:0; position:relative; z-index:90; }
  #sidebar.hidden { transform:translateX(-100%); margin-right:-280px; }
  #sidebar-header { padding:16px; font-size:15px; color:var(--ui-text); border-bottom:1px solid var(--ui-border); font-weight:bold; flex-shrink:0; display:flex; align-items:center; gap:8px; }
  #sidebar-header svg { stroke:var(--ui-text); stroke-width:2; }
  #toc-list { flex:1; overflow-y:auto; padding:8px 0; }
  #toc-list::-webkit-scrollbar { width:6px; }
  #toc-list::-webkit-scrollbar-thumb { background:var(--ui-border); border-radius:3px; }
  .toc-item { padding:12px 20px; color:var(--ui-text); cursor:pointer; font-size:14px; transition:all .15s; border-left:3px solid transparent; line-height:1.5; opacity:.85; }
  .toc-item:hover { background:var(--hover-bg); opacity:1; }
  .toc-item.current { border-left-color:var(--accent); background:var(--hover-bg); opacity:1; color:var(--accent); font-weight:500; }

  #reading-area { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; padding:var(--page-padding,16px); background:var(--bg); transition:padding .3s; }

  #welcome { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:32px; color:var(--text); opacity:.8; animation:fadeIn .5s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  #drop-zone { border:2px dashed var(--ui-border); border-radius:24px; padding:48px 64px; text-align:center; cursor:pointer; transition:all .2s; max-width:480px; background:var(--paper); box-shadow:0 4px 16px var(--page-shadow); }
  #drop-zone:hover { border-color:var(--accent); background:rgba(181,86,50,.03); transform:scale(1.02); }
  #drop-zone svg { width:64px; height:64px; stroke:var(--accent); opacity:.8; margin-bottom:24px; stroke-width:1.5; }
  #drop-zone h2 { font-size:24px; font-weight:600; margin-bottom:12px; }
  #drop-zone p { font-size:14px; opacity:.7; line-height:1.6; }

  #resume-banner { display:none; text-align:left; width:100%; max-width:480px; background:var(--ui-bg); border:1px solid var(--accent); border-radius:16px; padding:20px 24px; line-height:1.6; box-shadow:0 8px 24px var(--shadow), inset 0 0 0 1px rgba(181,86,50,0.2); position:relative; overflow:hidden; cursor:pointer; transition:transform .2s; }
  #resume-banner:hover { transform:translateY(-2px); }
  #resume-banner::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent); }
  #resume-banner .resume-label { font-size:12px; color:var(--accent); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
  #resume-banner .resume-title { display:block; font-size:16px; margin:6px 0 4px; font-family:"游明朝","YuMincho",serif; }
  #resume-banner .resume-hint { font-size:13px; opacity:.6; }

  #page-container { width:100%; height:100%; display:none; align-items:stretch; justify-content:center; position:relative; }
  #page-container.visible { display:flex; }

  #epub-frame { background:var(--paper); box-shadow:0 12px 48px var(--page-shadow),0 2px 12px var(--shadow); border-radius:4px; overflow:hidden; position:relative; display:flex; flex-direction:column; width:100%; max-width:var(--frame-max-width,900px); transition:max-width .3s cubic-bezier(0.16,1,0.3,1); }
  #page-overlay { position:absolute; inset:0; background:var(--paper); opacity:0; pointer-events:none; z-index:10; transition:opacity .2s cubic-bezier(0.2,0,0,1); }
  #page-overlay.flash { opacity:.8; }

  #content-iframe { width:100%; flex:1; border:none; background:transparent; display:block; }

  .chapter-btn { position:absolute; top:50%; transform:translateY(-50%); width:64px; height:140px; background:transparent; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:32px; transition:all .3s ease; opacity:0; z-index:20; -webkit-tap-highlight-color:transparent; outline:none !important; color:transparent; }
  .chapter-btn:focus, .chapter-btn:active { outline:none !important; background:transparent !important; color:transparent; }
  .chapter-btn svg { width:28px; height:28px; stroke:transparent; stroke-width:1.5; transition:stroke .3s; }
  #btn-prev { right:16px; }
  #btn-next { left:16px; }

  .scroll-btn { position:absolute; left:50%; transform:translateX(-50%); width:180px; height:56px; background:transparent; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:28px; transition:all .3s ease; opacity:0; z-index:20; -webkit-tap-highlight-color:transparent; outline:none !important; color:transparent; font-family:inherit; font-weight:500; font-size:14px; }
  .scroll-btn:focus, .scroll-btn:active { outline:none !important; background:transparent !important; color:transparent; }
  .scroll-btn svg { width:20px; height:20px; stroke:transparent; stroke-width:2; transition:stroke .3s; }

  #btn-scroll-fwd { bottom:max(24px, env(safe-area-inset-bottom, 24px)); width:360px; height:180px; border-radius:60px; font-size:18px; }
  #btn-scroll-fwd svg { width:28px; height:28px; }
  #btn-scroll-back { top:16px; }

  .nav-hint { opacity:0.8 !important; background:var(--accent) !important; color:#fff !important; box-shadow:0 8px 32px var(--shadow); }
  .nav-hint svg { stroke:#fff !important; }

  #statusbar { height:36px; background:var(--ui-bg); border-top:1px solid var(--ui-border); display:flex; align-items:center; padding:0 16px; gap:16px; font-size:13px; color:var(--ui-text); flex-shrink:0; position:relative; z-index:30; }
  #page-info { flex:1; text-align:center; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-variant-numeric: tabular-nums; letter-spacing: 0.5px; opacity: 0.8; }
  #progress-bar { width:160px; height:6px; background:var(--ui-border); border-radius:3px; overflow:hidden; }
  #progress-fill { height:100%; background:var(--accent); border-radius:3px; transition:width .3s ease-out; width:0%; }
  #key-hint { opacity:.5; font-size:12px; }

  #modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); z-index:200; display:none; align-items:center; justify-content:center; opacity:0; transition:opacity .2s; }
  #modal-overlay.show { display:flex; opacity:1; }
  #modal-box { background:var(--ui-bg); border:1px solid var(--ui-border); border-radius:16px; padding:32px; min-width:380px; max-width:480px; color:var(--ui-text); box-shadow:0 16px 48px rgba(0,0,0,.3); transform:translateY(20px) scale(0.95); transition:all .3s cubic-bezier(0.16,1,0.3,1); }
  #modal-overlay.show #modal-box { transform:translateY(0) scale(1); }
  #modal-box h3 { font-size:20px; margin-bottom:20px; color:var(--text); font-weight:600; display:flex; align-items:center; gap:8px; }
  #modal-box p { font-size:14px; line-height:1.8; opacity:.85; }
  #modal-body { max-height:calc(80vh - 120px); overflow-y:auto; }
  #modal-close { margin-top:24px; background:var(--accent); border:none; color:#fff; padding:10px 24px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; float:right; transition:filter .15s; }
  #modal-close:hover { filter:brightness(1.1); }
  #file-input { display:none; }
  #toast { position:fixed; top:72px; left:50%; transform:translateX(-50%) translateY(-10px); background:var(--text); color:var(--bg); padding:10px 24px; border-radius:24px; font-size:13px; font-weight:500; z-index:300; opacity:0; visibility:hidden; transition:all .3s cubic-bezier(0.16,1,0.3,1); pointer-events:none; white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,0.15); }
  #toast.show { opacity:1; visibility:visible; transform:translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--ui-border); border-radius:4px; border:2px solid var(--ui-bg); }
  ::-webkit-scrollbar-thumb:hover { background:var(--text); opacity:0.3; }

  /* ── スマホ向け ── */
  @media (max-width: 640px) {
    #statusbar { display:none; }
    #reading-area { padding:var(--page-padding,8px); }
    .chapter-btn { width:36px; height:60px; opacity:.3; border-radius:12px; }
    .scroll-btn { width:120px; height:40px; opacity:0; }
    #btn-scroll-fwd { bottom:max(16px, env(safe-area-inset-bottom, 16px)); opacity:.22; height:180px; width:360px; border-radius:24px; }
    #btn-scroll-back { top:16px; }
    #sidebar { width:240px; position:absolute; left:0; top:56px; bottom:0; z-index:95; border-right:1px solid var(--glass-border); background:var(--backdrop); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); }
    #sidebar.hidden { transform:translateX(-100%); margin-right:0; }
    #toolbar { padding:0 8px; }
    #book-title { display:none; }
    #settings-popover { right:8px; width:calc(100vw - 16px); }
  }

  /* ── タッチデバイス：ボタンをわずかに表示 ── */
  @media (hover: none) {
    .chapter-btn { opacity:.3; }
    .chapter-btn svg { stroke:var(--ui-text); }
    #btn-scroll-fwd { opacity:.22; }
  }
</style>
</head>
<body>

<div id="toolbar">
  <button id="open-btn" onclick="openFilePicker()" title="ePubファイルを開く">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"/><polyline points="14 2 14 8 20 8"/><path d="M4 15h12"/><path d="M4 19h12"/></svg>
    開く
  </button>
  <input type="file" id="file-input" accept=".epub,.kepub">

  <div class="tb-sep"></div>

  <button id="toc-btn" onclick="toggleSidebar()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    目次
  </button>

  <div id="book-title">ePub3ビューア</div>

  <button class="icon-btn" onclick="document.getElementById('bookmark-input').click()" title="しおり読込">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  </button>
  <button class="icon-btn" onclick="exportBookmarks()" title="しおり書出">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  </button>
  <input type="file" id="bookmark-input" accept=".json" style="display:none">

  <div class="tb-sep"></div>

  <button class="icon-btn" id="settings-btn" onclick="toggleSettings()" title="表示設定">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>

  <button class="icon-btn" onclick="flashNavButtons()" title="操作と配置を確認">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>

  <button class="icon-btn" onclick="showHelp()" title="ヘルプ">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  </button>
</div>

<div class="popover-overlay" id="settings-overlay" onclick="toggleSettings()"></div>
<div id="settings-popover">
  <div class="pop-header">
    表示設定
    <button class="icon-btn" onclick="toggleSettings()" style="padding:4px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="pop-body">
    <div class="set-group">
      <h4>カラー</h4>
      <div class="set-row">
        <span class="set-label">テーマ</span>
        <div class="theme-options">
          <div class="theme-btn tb-std" onclick="changeTheme('')" title="標準"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="theme-btn tb-sepia" onclick="changeTheme('sepia')" title="セピア"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="theme-btn tb-white" onclick="changeTheme('white')" title="白紙"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="theme-btn tb-dark" onclick="changeTheme('dark')" title="ダーク"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
        </div>
      </div>
    </div>

    <div class="set-group">
      <h4>タイポグラフィ</h4>
      <div class="set-row">
        <span class="set-label">フォント</span>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
        integrity="sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDxuGZ91N8bsOttmnomcCD3CS5ZMRL50H0GgOHvegtg=="
        crossorigin="anonymous"></script>
<script>
'use strict';

// ══════════════════════════════════════════
//  State
// ══════════════════════════════════════════
const state = {
  epub:null, opfPath:'', opfDir:'',
  spine:[], manifest:{}, toc:[],
  currentSpineIdx:0,
  bookTitle:'', bookCreator:'',
  fontMode:'publisher', fontSize:100, lineHeight:2.0, theme:'', margin:'full',
  writingMode:'vertical',  // 'vertical' | 'horizontal' | 'publisher'
  sidebarOpen:false,
  bookKey:'',
};

// テーマ別 ePub 本文エリアの色（iframe 内に直接注入）
const THEME_CONTENT = {
  '':      { paper: '#fdf8f0', text: '#1a1008' },
  sepia:   { paper: '#dfc89a', text: '#2e1a06' },
  white:   { paper: '#ffffff', text: '#111111' },
  dark:    { paper: '#111111', text: '#e8e8e8' },
};

const FONTS = {
  publisher: null,
  mincho:  '"游明朝","YuMincho","ヒラギノ明朝 ProN","HiraMinProN-W3","Noto Serif CJK JP",serif',
  gothic:  '"游ゴシック","YuGothic","ヒラギノ角ゴ ProN","HiraKakuProN-W3","Noto Sans CJK JP",sans-serif',
  meiryo:  '"メイリオ","Meiryo","MS Gothic",sans-serif',
  serif:   'serif',
  sans:    'sans-serif',
};

// ══════════════════════════════════════════
//  File Open（iOS Safari: ファイルピッカーのみ、ドラッグ＆ドロップなし）
// ══════════════════════════════════════════
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadEpub(e.target.files[0]);
  e.target.value = '';
});

async function loadEpub(file) {
  try {
    const zip = await JSZip.loadAsync(file);
    state.epub = zip;

    const containerEntry = zip.file('META-INF/container.xml');
    if (!containerEntry) throw new Error('META-INF/container.xml が見つかりません。有効な ePub ファイルではない可能性があります。');
    const cXml = await containerEntry.async('text');
    const cDoc = new DOMParser().parseFromString(cXml, 'application/xml');
    const rootfileEl = cDoc.querySelector('rootfile');
    if (!rootfileEl) throw new Error('container.xml に rootfile 要素がありません。ePub の構造が不正です。');
    state.opfPath = rootfileEl.getAttribute('full-path');
    if (!state.opfPath) throw new Error('rootfile の full-path 属性がありません。');
    state.opfDir  = state.opfPath.includes('/') ? state.opfPath.slice(0, state.opfPath.lastIndexOf('/')+1) : '';

    const opfEntry = zip.file(state.opfPath);
    if (!opfEntry) throw new Error(`OPF ファイルが見つかりません: ${state.opfPath}`);
    const opfXml = await opfEntry.async('text');
    const opfDoc = new DOMParser().parseFromString(opfXml, 'application/xml');

    state.manifest = {};
    opfDoc.querySelectorAll('manifest item').forEach(item => {
      const id = item.getAttribute('id');
      state.manifest[id] = {
        href: item.getAttribute('href'),
        mediaType: item.getAttribute('media-type'),
        absPath: state.opfDir + item.getAttribute('href'),
      };
    });

    state.spine = [];
    opfDoc.querySelectorAll('spine itemref').forEach(ref => {
      const item = state.manifest[ref.getAttribute('idref')];
      if (item) state.spine.push(item);
    });

    state.toc = [];
    const navEl = [...opfDoc.querySelectorAll('manifest item')]
      .find(i => (i.getAttribute('properties')||'').includes('nav'));
    if (navEl) {
      const navItem = state.manifest[navEl.getAttribute('id')];
      if (navItem) {
        const navFile = zip.file(navItem.absPath);
        if (!navFile) { console.warn('TOC file missing:', navItem.absPath); }
        const navXml = navFile ? await navFile.async('text') : '';
        const navDoc = new DOMParser().parseFromString(navXml, 'text/html');
        navDoc.querySelectorAll('nav a').forEach(a => {
          const label = a.textContent.trim();
          const href  = a.getAttribute('href');
          if (label && href) state.toc.push({label, href});
        });
      }
    }

    const titleEl = opfDoc.querySelector('metadata > *|title, metadata > title');
    const titleText = titleEl ? titleEl.textContent : file.name;
    state.bookTitle = titleText;
    state.bookCreator = [...opfDoc.querySelectorAll('metadata > *|creator, metadata > creator')]
      .map(el => el.textContent.trim()).filter(Boolean).join('・');
    document.getElementById('book-title').textContent = titleText;
    state.bookKey = 'epub_pos_' + titleText + '_' + state.spine.length;
    document.getElementById('welcome').style.display = 'none';
    document.getElementById('page-container').classList.add('visible');
    buildTocList();
    try { localStorage.setItem('epub_last_book', JSON.stringify({ title: titleText, bookKey: state.bookKey })); } catch(e) {}
    const saved = loadSavedPos();
    if (saved && saved.spineIdx > 0 && saved.spineIdx < state.spine.length) {
      if (state.sidebarOpen) toggleSidebar();
      await renderPage(saved.spineIdx, typeof saved.ratio === 'number' ? saved.ratio : 'start');
      showToast('📖 前回の続きから再開（' + (saved.spineIdx + 1) + ' / ' + state.spine.length + '章）');
      flashNavButtons();
    } else {
      await renderPage(0);
      flashNavButtons();
    }

  } catch(err) {
    alert('ePubの読み込みに失敗しました:\n' + err.message);
    console.error(err);
  }
}

// ══════════════════════════════════════════
//  TOC
// ══════════════════════════════════════════
function buildTocList() {
  const list = document.getElementById('toc-list');
  list.innerHTML = '';
  state.toc.forEach(item => {
    const div = document.createElement('div');
    div.className = 'toc-item';
    div.textContent = item.label;
    div.onclick = () => navigateToToc(item.href);
    list.appendChild(div);
  });
}
function navigateToToc(href) {
  const base = href.split('#')[0];
  const idx = state.spine.findIndex(s =>
    s.href === base ||
    s.absPath === state.opfDir + base ||
    s.absPath.endsWith('/' + base)
  );
  if (idx >= 0) renderPage(idx);
}
function updateTocHighlight() {
  const cur = state.spine[state.currentSpineIdx];
  document.querySelectorAll('.toc-item').forEach((el, i) => {
    const th = (state.toc[i]?.href || '').split('#')[0];
    el.classList.toggle('current',
      cur && (cur.href === th || cur.absPath === state.opfDir+th || cur.absPath.endsWith('/'+th))
    );
  });
}

// ══════════════════════════════════════════
//  Resource Resolution → data: URI
// ══════════════════════════════════════════
function resolvePath(baseDir, rel) {
  if (!rel || rel.startsWith('http') || rel.startsWith('data:') || rel.startsWith('blob:')) return rel;
  if (rel.startsWith('/')) return rel.slice(1);
  const parts = (baseDir + rel).split('/');
  const out = [];
  for (const p of parts) {
    if (p === '..') out.pop();
    else if (p && p !== '.') out.push(p);
  }
  return out.join('/');
}

const EXT_MIME = {
  ttf:'font/ttf', otf:'font/otf', woff:'font/woff', woff2:'font/woff2',
  jpg:'image/jpeg', jpeg:'image/jpeg', png:'image/png',
  gif:'image/gif', webp:'image/webp', svg:'image/svg+xml',
};

async function toDataUri(absPath) {
  const f = state.epub.file(absPath);
  if (!f) return null;
  const ext = absPath.split('.').pop().toLowerCase();
  const mime = EXT_MIME[ext] || 'application/octet-stream';
  const b64 = await f.async('base64');
  return 'data:' + mime + ';base64,' + b64;
}

async function resolveCssText(css, cssDir) {
  const re = /url\(\s*(['"]?)([^'"\)\s]+)\1\s*\)/g;
  const hits = [];
  let m;
  while ((m = re.exec(css)) !== null) hits.push({full:m[0], src:m[2]});
  for (const {full, src} of hits) {
    if (src.startsWith('data:') || src.startsWith('http') || src.startsWith('blob:')) continue;
    const uri = await toDataUri(resolvePath(cssDir, src));
    if (uri) css = css.split(full).join("url('" + uri + "')");
  }
  return css;
}

async function buildSrcdoc(xhtmlText, xhtmlAbsPath, scrollTarget) {
  const dir = xhtmlAbsPath.includes('/')
    ? xhtmlAbsPath.slice(0, xhtmlAbsPath.lastIndexOf('/')+1)
    : '';

  const doc = new DOMParser().parseFromString(xhtmlText, 'text/html');

  // ePub 内の <script> を除去（XSS 対策）
  doc.querySelectorAll('script').forEach(s => s.remove());

  // <base href="about:blank"> を先頭に挿入
  doc.querySelectorAll('base').forEach(b => b.remove());
  const safeBase = doc.createElement('base');
  safeBase.setAttribute('href', 'about:blank');
  doc.head.insertBefore(safeBase, doc.head.firstChild);

  // <link rel="stylesheet"> → inline <style>
  for (const link of [...doc.querySelectorAll('link[rel="stylesheet"]')]) {
    const href = link.getAttribute('href') || '';
    if (href.startsWith('data:') || href.startsWith('http')) continue;
    const absPath = resolvePath(dir, href);
    const f = state.epub.file(absPath);
    if (!f) { link.remove(); continue; }
    const cssDir = absPath.includes('/') ? absPath.slice(0, absPath.lastIndexOf('/')+1) : '';
    let css = await f.async('text');
    css = await resolveCssText(css, cssDir);
    const style = doc.createElement('style');
    style.textContent = css;
    link.parentNode.replaceChild(style, link);
  }

  // <style> blocks
  for (const style of [...doc.querySelectorAll('style')]) {
    style.textContent = await resolveCssText(style.textContent, dir);
  }

  // <img src>
  for (const img of [...doc.querySelectorAll('img')]) {
    const src = img.getAttribute('src') || '';
    if (!src || src.startsWith('data:') || src.startsWith('http')) continue;
    const uri = await toDataUri(resolvePath(dir, src));
    if (uri) img.setAttribute('src', uri);
  }

  // inline style url()
  for (const el of [...doc.querySelectorAll('[style]')]) {
    const s = el.getAttribute('style') || '';
    if (s.includes('url(')) el.setAttribute('style', await resolveCssText(s, dir));
  }

  // ── iOS Safari 向けスタイル注入 ──
  // iOS Safari の iframe 内では scroll API が動作しないため、
  // body を position:fixed + writing-mode:vertical-rl にして
  // body.style.transform = translateX(tx) でコンテンツを横移動させる。
  const font   = FONTS[state.fontMode];
  const colors = THEME_CONTENT[state.theme] || THEME_CONTENT[''];
  const paper  = colors.paper;
  const text   = colors.text;
  const fontRule = font ? 'body,body *{font-family:' + font + '!important;}' : '';
  const wm = state.writingMode;
  const bodyWmCss = wm === 'vertical'
    ? 'position:fixed!important;top:0!important;bottom:0!important;left:0!important;' +
      'width:max-content!important;min-width:100vw!important;max-width:none!important;' +
      'overflow:visible!important;' +
      'writing-mode:vertical-rl!important;-webkit-writing-mode:vertical-rl!important;'
    : wm === 'horizontal'
      ? 'position:fixed!important;top:0!important;left:0!important;right:0!important;' +
        'height:max-content!important;min-height:100vh!important;max-height:none!important;' +
        'overflow:visible!important;' +
        'writing-mode:horizontal-tb!important;-webkit-writing-mode:horizontal-tb!important;'
      : /* publisher */
        'position:fixed!important;top:0!important;left:0!important;' +
        'overflow:visible!important;max-width:none!important;max-height:none!important;';
  const overrideStyle = doc.createElement('style');
  overrideStyle.id = 'epub-viewer-inject';
  overrideStyle.textContent = [
    'html{height:100%!important;overflow:hidden!important;',
        'margin:0!important;padding:0!important;',
        'background:' + paper + '!important;}',
    'body{' + bodyWmCss,
        'will-change:transform;',
        'margin:0!important;padding:0!important;',
        'background:' + paper + '!important;',
        'color:' + text + '!important;',
        'font-size:' + state.fontSize + '%!important;',
        'line-height:' + state.lineHeight + '!important;',
        'opacity:0!important;}',
    'img{max-width:100%!important;max-height:95vh!important;object-fit:contain!important;}',
    fontRule,
  ].join('');
  doc.head.appendChild(overrideStyle);

  const scrollScript = doc.createElement('script');
  scrollScript.textContent = buildScrollScript(scrollTarget, state.writingMode);
  doc.body.appendChild(scrollScript);

  return '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
}

// ══════════════════════════════════════════
//  Scroll Script（iOS Safari 専用設計 - CSS transform 方式）
// ══════════════════════════════════════════
function buildScrollScript(scrollTarget, writingMode) {
  // iOS Safari の scroll API を完全に回避し、CSS transform で列をスライドする。
  //
  // 縦書き（vertical）: translateX
  //   tx = -maxS : body 右端 = viewport 右端 = column 1 = コンテンツ先頭
  //   tx = 0     : body 左端 = viewport 左端 = 最終列 = コンテンツ末尾
  //   前進: tx 増加（-maxS → 0 → blank zone）
  //
  // 横書き（horizontal）: translateY
  //   ty = 0     : body 上端 = viewport 上端 = コンテンツ先頭
  //   ty = maxS  : body 下端 = viewport 下端 = コンテンツ末尾
  //   前進: ty 増加（0 → maxS → blank zone）
  //
  // ePub指定（publisher）: 描画後に writing-mode を検出して軸を切り替え
  const t = JSON.stringify(scrollTarget);

  const CLICK_HANDLER = `
  document.addEventListener('click', function(ev){
    var a = ev.target.closest('a');
    if(!a) return;
    var href = a.getAttribute('href') || '';
    if(!href) return;
    ev.preventDefault();
    if(href.startsWith('http://')||href.startsWith('https://')||href.startsWith('//')){
      window.open(href,'_blank','noopener,noreferrer'); return;
    }
    if(href.startsWith('#')) return;
    window.parent.postMessage({type:'EPUB_LINK',href:href},'*');
  });`;

  const INIT_FN = `
  function init(){
    function run(){
      // double-rAF: iPhoneでは十分。iPadは500msフォールバックで再測定。
      requestAnimationFrame(function(){
        requestAnimationFrame(applyInit);
      });
      // iPad等で writing-mode レイアウトが遅延する場合のフォールバック再適用
      setTimeout(applyInit, 500);
    }
    if(document.readyState === 'complete') run();
    else window.addEventListener('load', run, {once:true});
  }
  init();`;

  if (writingMode === 'horizontal') {
    return `(function(){
  var STEP = 0.92;
  var initTarget = ${t};
  var body = document.body;
  var ty = 0;
  var posTimer = null;

  function vh(){ return window.innerHeight; }
  function maxS(){ return Math.max(0, body.offsetHeight - vh()); }

  function postEdge(d){ window.parent.postMessage({type:'EPUB_EDGE',direction:d},'*'); }
  function postPos(r){  window.parent.postMessage({type:'EPUB_POS', ratio:r},  '*'); }

  function setTy(y){
    ty = y;
    body.style.setProperty('transform','translateY(-'+y+'px)','important');
    clearTimeout(posTimer);
    posTimer = setTimeout(reportPos, 500);
  }

  function reportPos(){
    var ms = maxS();
    if(ms <= 0){ postPos(0); return; }
    postPos(Math.max(0, Math.min(1, ty / ms)));
  }

  function applyInit(){
    var ms = maxS();
    if(initTarget === 'end'){
      setTy(ms);
    } else if(typeof initTarget === 'number'){
      setTy(initTarget * ms);
    } else {
      setTy(0);
    }
    body.style.setProperty('opacity','1','important');
  }

  function doScroll(dir){
    var ms = maxS();
    if(ms <= 0){ postEdge(dir); return; }
    var step = vh() * STEP;
    if(dir === 1){
      if(ty >= ms + 2){ postEdge(1); return; }
      setTy(Math.min(ty + step, ms + step));
    } else {
      if(ty <= 2){ postEdge(-1); return; }
      setTy(Math.max(ty - step, 0));
    }
  }

  window.addEventListener('message', function(ev){
    if(!ev.data || ev.data.type !== 'EPUB_SCROLL') return;
    doScroll(ev.data.direction);
  });

  var touchStartY = 0;
  document.addEventListener('touchstart', function(e){
    touchStartY = e.touches[0].clientY;
  }, {passive:true});
  document.addEventListener('touchend', function(e){
    var dy = e.changedTouches[0].clientY - touchStartY;
    if(Math.abs(dy) > 50) doScroll(dy < 0 ? 1 : -1);
  }, {passive:true});
${CLICK_HANDLER}
${INIT_FN}
})();`;
  }

  if (writingMode === 'publisher') {
    return `(function(){
  var STEP = 0.92;
  var initTarget = ${t};
  var body = document.body;
  var _axis = null; // 'h' = vertical-rl (translateX), 'v' = horizontal-tb (translateY)
  var tx = 0, ty = 0;
  var posTimer = null;

  function vw(){ return window.innerWidth; }
  function vh(){ return window.innerHeight; }

  function detectAxis(){
    if(_axis) return _axis;
    var wm = getComputedStyle(body).writingMode || '';
    _axis = wm.indexOf('vertical') >= 0 ? 'h' : 'v';
    if(_axis === 'h'){
      body.style.setProperty('bottom','0','important');
      body.style.setProperty('width','max-content','important');
      body.style.setProperty('min-width','100vw','important');
    } else {
      body.style.setProperty('right','0','important');
      body.style.setProperty('height','max-content','important');
      body.style.setProperty('min-height','100vh','important');
    }
    return _axis;
  }

  function postEdge(d){ window.parent.postMessage({type:'EPUB_EDGE',direction:d},'*'); }
  function postPos(r){  window.parent.postMessage({type:'EPUB_POS', ratio:r},  '*'); }

  function setTx(x){
    tx = x;
    body.style.setProperty('transform','translateX('+x+'px)','important');
    clearTimeout(posTimer);
    posTimer = setTimeout(reportPos, 500);
  }
  function setTy(y){
    ty = y;
    body.style.setProperty('transform','translateY(-'+y+'px)','important');
    clearTimeout(posTimer);
    posTimer = setTimeout(reportPos, 500);
  }

  function reportPos(){
    var ax = detectAxis(), ms;
    if(ax === 'h'){
      ms = Math.max(0, body.offsetWidth - vw());
      if(ms <= 0){ postPos(0); return; }
      postPos(Math.max(0, Math.min(1, (tx + ms) / ms)));
    } else {
      ms = Math.max(0, body.offsetHeight - vh());
      if(ms <= 0){ postPos(0); return; }
      postPos(Math.max(0, Math.min(1, ty / ms)));
    }
  }

  function applyInit(){
    var ax = detectAxis(), ms;
    if(ax === 'h'){
      ms = Math.max(0, body.offsetWidth - vw());
      if(initTarget === 'end'){ setTx(0); }
      else if(typeof initTarget === 'number'){ setTx(-(1 - initTarget) * ms); }
      else { setTx(-ms); }
    } else {
      ms = Math.max(0, body.offsetHeight - vh());
      if(initTarget === 'end'){ setTy(ms); }
      else if(typeof initTarget === 'number'){ setTy(initTarget * ms); }
      else { setTy(0); }
    }
    body.style.setProperty('opacity','1','important');
  }

  function doScroll(dir){
    var ax = detectAxis(), ms, step;
    if(ax === 'h'){
      ms = Math.max(0, body.offsetWidth - vw());
      if(ms <= 0){ postEdge(dir); return; }
      step = vw() * STEP;
      if(dir === 1){
        if(tx >= -2){ postEdge(1); return; }
        setTx(Math.min(tx + step, 0));
      } else {
        if(tx <= -(ms - 2)){ postEdge(-1); return; }
        setTx(Math.max(tx - step, -ms));
      }
    } else {
      ms = Math.max(0, body.offsetHeight - vh());
      if(ms <= 0){ postEdge(dir); return; }
      step = vh() * STEP;
      if(dir === 1){
        if(ty >= ms - 2){ postEdge(1); return; }
        setTy(Math.min(ty + step, ms));
      } else {
        if(ty <= 2){ postEdge(-1); return; }
        setTy(Math.max(ty - step, 0));
      }
    }
  }

  window.addEventListener('message', function(ev){
    if(!ev.data || ev.data.type !== 'EPUB_SCROLL') return;
    doScroll(ev.data.direction);
  });

  var touchStartX = 0, touchStartY = 0;
  document.addEventListener('touchstart', function(e){
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, {passive:true});
  document.addEventListener('touchend', function(e){
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    var ax = detectAxis();
    if(ax === 'h'){
      if(Math.abs(dx) > 50) doScroll(dx < 0 ? 1 : -1);
    } else {
      if(Math.abs(dy) > 50) doScroll(dy < 0 ? 1 : -1);
    }
  }, {passive:true});
${CLICK_HANDLER}
${INIT_FN}
})();`;
  }

  // Default: 縦書き（vertical）- translateX
  return `(function(){
  var STEP = 0.92;
  var initTarget = ${t};
  var body = document.body;
  var tx = 0;
  var posTimer = null;

  function vw(){ return window.innerWidth; }
  function maxS(){ return Math.max(0, body.offsetWidth - vw()); }

  function postEdge(d){ window.parent.postMessage({type:'EPUB_EDGE',direction:d},'*'); }
  function postPos(r){  window.parent.postMessage({type:'EPUB_POS', ratio:r},  '*'); }

  function setTx(x){
    tx = x;
    body.style.setProperty('transform','translateX('+x+'px)','important');
    clearTimeout(posTimer);
    posTimer = setTimeout(reportPos, 500);
  }

  function reportPos(){
    var ms = maxS();
    if(ms <= 0){ postPos(0); return; }
    // ratio: 0=先頭(tx=-ms), 1=末尾(tx=0)
    postPos(Math.max(0, Math.min(1, (tx + ms) / ms)));
  }

  function applyInit(){
    var ms = maxS();
    if(initTarget === 'end'){
      setTx(0);
    } else if(typeof initTarget === 'number'){
      setTx(-(1 - initTarget) * ms);
    } else {
      setTx(-ms); // 'start': body の右端を viewport 右端に合わせる
    }
    body.style.setProperty('opacity','1','important');
  }

  function doScroll(dir){
    var ms = maxS();
    if(ms <= 0){ postEdge(dir); return; }
    var step = vw() * STEP;
    if(dir === 1){ // 前進: tx → 0 → blank zone (tx > 0)
      if(tx >= 2){ postEdge(1); return; }
      setTx(Math.min(tx + step, step)); // blank zone 上限 = 1 step 分
    } else {       // 後退: tx → -ms
      if(tx <= -(ms - 2)){ postEdge(-1); return; }
      setTx(Math.max(tx - step, -ms));
    }
  }

  window.addEventListener('message', function(ev){
    if(!ev.data || ev.data.type !== 'EPUB_SCROLL') return;
    doScroll(ev.data.direction);
  });

  // タッチスワイプでページ送り
  var touchStartX = 0;
  document.addEventListener('touchstart', function(e){
    touchStartX = e.touches[0].clientX;
  }, {passive:true});
  document.addEventListener('touchend', function(e){
    var dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx) > 50) doScroll(dx < 0 ? 1 : -1);
  }, {passive:true});
${CLICK_HANDLER}
${INIT_FN}
})();`;
}


// ══════════════════════════════════════════
//  Render Page
// ══════════════════════════════════════════
let _renderSeq = 0;

async function renderPage(idx, scrollTarget) {
  if (!state.epub || idx < 0 || idx >= state.spine.length) return;
  if (scrollTarget === undefined) scrollTarget = 'start';
  const seq = ++_renderSeq;
  state.currentSpineIdx = idx;
  flashOverlay();

  const spineItem = state.spine[idx];
  const spineFile = state.epub.file(spineItem.absPath);
  if (!spineFile) { showToast('⚠️ ファイルが見つかりません: ' + spineItem.absPath); return; }
  const xhtmlText = await spineFile.async('text');
  if (seq !== _renderSeq) return;
  const srcdoc = await buildSrcdoc(xhtmlText, spineItem.absPath, scrollTarget);
  if (seq !== _renderSeq) return;

  const iframe = document.getElementById('content-iframe');
  iframe.srcdoc = srcdoc;

  updatePageInfo();
  updateTocHighlight();
}

// ══════════════════════════════════════════
//  Navigation
// ══════════════════════════════════════════
function nextChapter() {
  if (state.currentSpineIdx < state.spine.length-1) renderPage(state.currentSpineIdx+1, 'start');
}
function prevChapter() {
  if (state.currentSpineIdx > 0) renderPage(state.currentSpineIdx-1, 'start');
}

function scrollPage(direction) {
  const active = document.activeElement;
  if (active && (active.classList.contains('scroll-btn') || active.classList.contains('chapter-btn'))) active.blur();
  const iframe = document.getElementById('content-iframe');
  if (iframe.contentWindow) {
    iframe.contentWindow.postMessage({type:'EPUB_SCROLL', direction}, '*');
  }
}

window.addEventListener('message', e => {
  if (!e.data) return;
  if (e.data.type === 'EPUB_EDGE') {
    const dir = e.data.direction;
    if (dir === 1  && state.currentSpineIdx < state.spine.length-1) renderPage(state.currentSpineIdx+1, 'start');
    if (dir === -1 && state.currentSpineIdx > 0)                    renderPage(state.currentSpineIdx-1, 'end');
  }
  if (e.data.type === 'EPUB_POS') {
    savePos(e.data.ratio);
  }
  if (e.data.type === 'EPUB_LINK') {
    handleIframeLink(e.data.href);
  }
});

function handleIframeLink(href) {
  const base   = href.split('#')[0];
  if (!base) return;
  const curItem = state.spine[state.currentSpineIdx];
  const curDir  = curItem.absPath.includes('/')
    ? curItem.absPath.slice(0, curItem.absPath.lastIndexOf('/') + 1)
    : '';
  const absTarget = resolvePath(curDir, base);
  const idx = state.spine.findIndex(s => s.absPath === absTarget);
  if (idx >= 0) renderPage(idx, 'start');
}

function flashOverlay() {
  const o = document.getElementById('page-overlay');
  o.classList.add('flash');
  setTimeout(() => o.classList.remove('flash'), 150);
}
function flashNavButtons() {
  const btns = document.querySelectorAll('.chapter-btn, .scroll-btn');
  btns.forEach(b => b.classList.add('nav-hint'));
  setTimeout(() => {
    btns.forEach(b => b.classList.remove('nav-hint'));
  }, 3500);
}
function updatePageInfo() {
  const total = state.spine.length, cur = state.currentSpineIdx+1;
  document.getElementById('page-info').textContent = cur + ' / ' + total;
  document.getElementById('progress-fill').style.width =
    (total > 1 ? (cur-1)/(total-1)*100 : 100) + '%';
}

// ══════════════════════════════════════════
//  Keyboard（Bluetooth キーボード対応）
// ══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
  switch(e.key) {
    case ' ':
      e.shiftKey ? scrollPage(-1) : scrollPage(1);
      e.preventDefault(); break;
    case 'ArrowDown': case 'PageDown':
      scrollPage(1); e.preventDefault(); break;
    case 'ArrowUp': case 'PageUp':
      scrollPage(-1); e.preventDefault(); break;
    case 'ArrowLeft':
      nextChapter(); e.preventDefault(); break;
    case 'ArrowRight':
      prevChapter(); e.preventDefault(); break;
    case 'Home':
      renderPage(0, 'start'); e.preventDefault(); break;
    case 'End':
      renderPage(state.spine.length-1, 'end'); e.preventDefault(); break;
  }
});

// ══════════════════════════════════════════
//  Settings
// ══════════════════════════════════════════
const SETTINGS_KEY = 'epub_settings';

function saveSettings() {
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({
      fontMode:    state.fontMode,
      fontSize:    state.fontSize,
      lineHeight:  state.lineHeight,
      theme:       state.theme,
      margin:      state.margin,
      writingMode: state.writingMode,
    }));
  } catch(e) {
    notifyStorageError();
  }
}

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY));
    if (!s) return;
    if (s.fontMode)             { state.fontMode = s.fontMode;         const el = document.getElementById('font-select'); if(el) el.value = s.fontMode; }
    if (s.fontSize)             { state.fontSize = s.fontSize;         const el = document.getElementById('font-size-display'); if(el) el.textContent = s.fontSize + '%'; }
    if (s.lineHeight)           { state.lineHeight = s.lineHeight;     const el = document.getElementById('lineh-select'); if(el) el.value = String(s.lineHeight); }
    if (s.theme !== undefined)  { state.theme = s.theme;               document.body.className = s.theme ? 'theme-' + s.theme : ''; if(typeof updateThemeBtnUI === 'function') updateThemeBtnUI(); }
    if (s.margin)               { state.margin = s.margin;             const el = document.getElementById('margin-select'); if(el) el.value = s.margin; applyMargin(s.margin); }
    if (s.writingMode)          { state.writingMode = s.writingMode;   const el = document.getElementById('writing-mode-select'); if(el) el.value = s.writingMode; }
  } catch(e) { console.warn("Failed to load settings fully:", e); }
}

function toggleSettings() {
  const pop = document.getElementById('settings-popover');
  const overlay = document.getElementById('settings-overlay');
  if(pop.classList.contains('show')) {
    pop.classList.remove('show');
    overlay.classList.remove('show');
    document.getElementById('settings-btn').classList.remove('active');
  } else {
    pop.classList.add('show');
    overlay.classList.add('show');
    document.getElementById('settings-btn').classList.add('active');
    updateThemeBtnUI();
  }
}

function updateThemeBtnUI() {
  const th = state.theme || '';
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  let btn = document.querySelector('.tb-' + (th || 'std'));
  if (btn) btn.classList.add('active');
}

// changeTheme をラップして theme ボタン UI を同期
const _origChangeTheme = changeTheme;
changeTheme = function(v) {
  _origChangeTheme(v);
  updateThemeBtnUI();
};

function resumeBook() {
  const data = JSON.parse(localStorage.getItem('epub_last_book'));
  if (data && data.title) {
    showToast('同じファイル「' + data.title + '」を開いてください');
    openFilePicker();
  }
}

function toggleSidebar() {
  state.sidebarOpen = !state.sidebarOpen;
  document.getElementById('sidebar').classList.toggle('hidden', !state.sidebarOpen);
  document.getElementById('toc-btn').classList.toggle('active', state.sidebarOpen);
}
function changeFont(v) {
  state.fontMode = v;
  saveSettings();
  if (state.spine.length) renderPage(state.currentSpineIdx);
}
function changeFontSize(d) {
  const step = state.fontSize >= 200 ? 20 : 10;
  state.fontSize = Math.max(60, Math.min(400, state.fontSize + d * step));
  document.getElementById('font-size-display').textContent = state.fontSize + '%';
  saveSettings();
  if (state.spine.length) renderPage(state.currentSpineIdx);
}
function changeLineHeight(v) {
  state.lineHeight = parseFloat(v);
  saveSettings();
  if (state.spine.length) renderPage(state.currentSpineIdx);
}
function changeTheme(v) {
  state.theme = v;
  document.body.className = v ? 'theme-'+v : '';
  saveSettings();
  if (state.spine.length) renderPage(state.currentSpineIdx);
}
function applyMargin(v) {
  const presets = {
    full:   { padding: '12px', maxWidth: '900px' },
    medium: { padding: '6px',  maxWidth: '1400px' },
    narrow: { padding: '4px',  maxWidth: '2000px' },
    none:   { padding: '0px',  maxWidth: '100%' },
  };
  const p = presets[v] || presets['full'];
  document.documentElement.style.setProperty('--page-padding', p.padding);
  document.documentElement.style.setProperty('--frame-max-width', p.maxWidth);
}
function changeMargin(v) {
  state.margin = v;
  applyMargin(v);
  saveSettings();
}
function changeWritingMode(v) {
  state.writingMode = v;
  saveSettings();
  if (state.spine.length) renderPage(state.currentSpineIdx);
}

// ══════════════════════════════════════════
//  File Picker
// ══════════════════════════════════════════
function openFilePicker() {
  document.getElementById('file-input').click();
}

// ══════════════════════════════════════════
//  Resume（レジューム）
// ══════════════════════════════════════════
function showResumeBanner() {
  try {
    const data = JSON.parse(localStorage.getItem('epub_last_book'));
    if (!data || !data.title) return;
    const savedPos = data.bookKey ? JSON.parse(localStorage.getItem(data.bookKey)) : null;
    if (!savedPos || (savedPos.spineIdx === 0 && savedPos.ratio <= 0.01)) return;
    document.getElementById('resume-title').textContent = data.title;
    document.getElementById('resume-banner').style.display = 'block';
  } catch(e) {}
}

// ══════════════════════════════════════════
//  Bookmark（しおり）
// ══════════════════════════════════════════
function loadSavedPos() {
  if (!state.bookKey) return null;
  try { return JSON.parse(localStorage.getItem(state.bookKey)); } catch(e) { return null; }
}
function savePos(ratio) {
  if (!state.bookKey || !state.epub) return;
  try {
    localStorage.setItem(state.bookKey, JSON.stringify({
      spineIdx: state.currentSpineIdx,
      ratio: ratio,
    }));
  } catch(e) {
    notifyStorageError();
  }
}

// ══════════════════════════════════════════
//  Bookmark Export / Import
// ══════════════════════════════════════════
function exportBookmarks() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('epub_pos_') || key === 'epub_last_book') {
      try { data[key] = JSON.parse(localStorage.getItem(key)); } catch(e) { data[key] = localStorage.getItem(key); }
    }
  }
  const count = Object.keys(data).filter(k => k.startsWith('epub_pos_')).length;
  if (count === 0) { showToast('書き出せるしおりがありません'); return; }
  const blob = new Blob(
    [JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), bookmarks: data }, null, 2)],
    { type: 'application/json' }
  );
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
  a.href = url;
  a.download = 'epub_bookmarks_' + date + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 ' + count + '冊分のしおりを書き出しました');
}

document.getElementById('bookmark-input').addEventListener('change', e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const json = JSON.parse(ev.target.result);
      if (!json.bookmarks || typeof json.bookmarks !== 'object') throw new Error('形式が不正です');
      let count = 0;
      for (const [key, val] of Object.entries(json.bookmarks)) {
        if (!key.startsWith('epub_pos_') && key !== 'epub_last_book') continue;
        try {
          localStorage.setItem(key, typeof val === 'string' ? val : JSON.stringify(val));
          if (key.startsWith('epub_pos_')) count++;
        } catch(e) { notifyStorageError(); break; }
      }
      showToast('📥 ' + count + '冊分のしおりを読み込みました');
      showResumeBanner();
      updateThemeBtnUI();
    } catch(err) {
      alert('しおりファイルの読み込みに失敗しました:\n' + err.message);
    }
  };
  reader.readAsText(file);
});

function notifyStorageError() {
  if (window._storageWarnShown) return;
  window._storageWarnShown = true;
  showToast('⚠️ しおり・設定の保存に失敗しました（ストレージ容量不足の可能性）');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════
//  Help / Modal
// ══════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showHelp() {
  document.getElementById('modal-title').textContent = 'ヘルプ';
  const bookInfo = state.epub ? [
    '<div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:12px 16px;margin-bottom:16px;">',
    '<p style="font-size:11px;opacity:.55;margin-bottom:6px;">📚 現在の書籍</p>',
    '<p style="font-size:14px;font-weight:bold;line-height:1.6;opacity:1;margin-bottom:4px;">' + esc(state.bookTitle) + '</p>',
    state.bookCreator ? '<p>著者：' + esc(state.bookCreator) + '</p>' : '',
    '<p>チャプター数：' + state.spine.length + '</p>',
    state.toc.length ? '<p>目次項目数：' + state.toc.length + '</p>' : '',
    '</div>',
  ].join('') : '';
  document.getElementById('modal-body').innerHTML = bookInfo + [
    '<p><strong>📱 ページスクロール（主操作）</strong></p>',
    '<p>　左スワイプ：1画面分 前進スクロール</p>',
    '<p>　右スワイプ：1画面分 後退スクロール</p>',
    '<p>　画面下「次へ」・上「前へ」ボタン</p>',
    '<p>　※章末尾/先頭で自動的に章移動</p>',
    '<br>',
    '<p><strong>📖 章切り替え</strong></p>',
    '<p>　右「›」ボタン：前の章</p>',
    '<p>　左「‹」ボタン：次の章</p>',
    '<br>',
    '<p><strong>🔵 Bluetoothキーボード</strong></p>',
    '<p>　スペース：次へ　Shift+スペース：前へ</p>',
    '<p>　← 次の章　→ 前の章</p>',
    '<br>',
    '<p><strong>フォント／テーマ</strong></p>',
    '<p>　設定パネル（歯車アイコン）で変更</p>',
    '<br>',
    '<p><strong>ファイル形式</strong></p>',
    '<p>　.epub / .kepub（Kobo）対応</p>',
  ].join('');
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  flashNavButtons();
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// Init
loadSettings();
showResumeBanner();
updateThemeBtnUI();
